<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key Signatures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const SVG = { width: 1280, height: 560 };

const STAFF = {
  left: 80,
  right: 1200,
  top: 182,
  gap: 22,
  clefX: 105,
  keyX: 180,
  timeX: 255,
  musicStartX: 320,
};

const NOTE = {
  rx: 13.33,
  ry: 9.52,
  stemLength: 67,
};

const BAR_COUNT = 3;
const BUILD_KEY_CHANCE = 0.5;
const TREBLE_CLEF = String.fromCodePoint(0x1d11e);

const COLOUR = {
  green: "#16a34a",
  red: "#dc2626",
};

const KEYS = [
  { id: "c-major", label: "C major", signature: "none", help: "C major has no sharps or flats." },
  { id: "a-minor", label: "A minor", signature: "none", help: "A minor has no sharps or flats. It can include a raised G sharp in the music." },
  { id: "g-major", label: "G major", signature: "sharp", help: "G major has one sharp: F sharp." },
  { id: "f-major", label: "F major", signature: "flat", help: "F major has one flat: B flat." },
];

const NOTE_STEPS = {
  C4: -2,
  D4: -1,
  E4: 0,
  F4: 1,
  G4: 2,
  A4: 3,
  B4: 4,
  C5: 5,
  D5: 6,
  E5: 7,
  F5: 8,
  G5: 9,
  A5: 10,
};

const KEY_POOLS = {
  "c-major": ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "a-minor": ["G4", "G#4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "G#5", "A5"],
  "g-major": ["G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "f-major": ["F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
};

const TONIC_START = {
  "c-major": "C4",
  "a-minor": "A4",
  "g-major": "G4",
  "f-major": "F4",
};

const RHYTHMS = {
  semibreve: { id: "semibreve", spacing: 3.2 },
  minim: { id: "minim", spacing: 2.2 },
  "dotted-crotchet": { id: "dotted-crotchet", spacing: 1.8 },
  crotchet: { id: "crotchet", spacing: 1.3 },
  quaver: { id: "quaver", spacing: 1 },
};

const STANDARD_BAR_PATTERNS = [
  ["minim", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "minim"],
  ["minim", "minim"],
  ["crotchet", "crotchet", "crotchet", "crotchet"],
  ["dotted-crotchet", "quaver", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
  ["quaver", "quaver", "quaver", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"],
  ["minim", "quaver", "quaver", "quaver", "quaver"],
];

const FINAL_BAR_PATTERNS = [...STANDARD_BAR_PATTERNS, ["semibreve"]];

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function randomIndex(length) {
  return Math.floor(Math.random() * length);
}

function noteBase(note) {
  return typeof note === "string" ? note.replace("#", "") : "C5";
}

function noteStep(note) {
  return NOTE_STEPS[noteBase(note)] ?? NOTE_STEPS.C5;
}

function yForStep(step) {
  return STAFF.top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function rhythmSpacing(id) {
  return RHYTHMS[id]?.spacing ?? RHYTHMS.crotchet.spacing;
}

function stemDown(step) {
  return step > 4;
}

function accidentalGlyph(type) {
  if (type === "sharp") return "♯";
  if (type === "flat") return "♭";
  return null;
}

function accidentalX(type, offset = 0) {
  return type === "flat" ? STAFF.keyX - 5 + offset : STAFF.keyX + offset;
}

function accidentalY(type, step) {
  return type === "sharp" ? yForStep(step) + 15 : yForStep(step) + 12;
}

function expectedBuildAccidental(keyId) {
  if (keyId === "g-major") return { type: "sharp", step: 8 };
  if (keyId === "f-major") return { type: "flat", step: 4 };
  return null;
}

function nearestPoolIndex(pool, previousNote) {
  const base = noteBase(previousNote);
  const exact = pool.findIndex((note) => noteBase(note) === base);
  return exact >= 0 ? exact : Math.floor(pool.length / 2);
}

function chooseNextNote(pool, previousNote) {
  const current = nearestPoolIndex(pool, previousNote);
  let move = randomItem([-3, -2, -1, 1, 2, 3]);
  if (Math.random() < 0.08) move = Math.random() < 0.5 ? -7 : 7;
  return pool[clamp(current + move, 0, pool.length - 1)] ?? previousNote ?? pool[0];
}

function chooseBeamedQuaverNote(pool, previousNote) {
  const current = nearestPoolIndex(pool, previousNote);
  const moves = [];
  if (current > 0) moves.push(-1);
  if (current < pool.length - 1) moves.push(1);
  return moves.length ? pool[current + randomItem(moves)] : pool[current];
}

function makeBarRhythms(barIndex) {
  return randomItem(barIndex === BAR_COUNT - 1 ? FINAL_BAR_PATTERNS : STANDARD_BAR_PATTERNS);
}

function chooseQuestionKey(type) {
  if (type !== "build-key") return randomItem(KEYS);
  const noAccidentalKeys = KEYS.filter((key) => key.id === "c-major" || key.id === "a-minor");
  const accidentalKeys = KEYS.filter((key) => key.id === "g-major" || key.id === "f-major");
  return Math.random() < 0.1 ? randomItem(noAccidentalKeys) : randomItem(accidentalKeys);
}

function createQuestion(options = { identify: true, build: true }) {
  const allowIdentify = options.identify !== false;
  const allowBuild = options.build !== false;
  const type = allowIdentify && allowBuild
    ? Math.random() < BUILD_KEY_CHANCE ? "build-key" : "identify-key"
    : allowBuild
      ? "build-key"
      : "identify-key";
  const key = chooseQuestionKey(type);
  const pool = KEY_POOLS[key.id];
  const bars = [];
  let previous = TONIC_START[key.id];
  let hasGSharp = false;

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const pattern = makeBarRhythms(barIndex);
    const bar = [];

    for (let noteIndex = 0; noteIndex < pattern.length; noteIndex += 1) {
      let pitch;
      if (barIndex === 0 && noteIndex === 0) {
        pitch = TONIC_START[key.id];
      } else {
        const stepwiseQuaver = pattern[noteIndex] === "quaver" && pattern[noteIndex - 1] === "quaver";
        pitch = stepwiseQuaver ? chooseBeamedQuaverNote(pool, previous) : chooseNextNote(pool, previous);
      }

      if (!pitch) pitch = previous || TONIC_START[key.id] || "C5";
      if (key.id === "a-minor" && pitch.includes("G#")) hasGSharp = true;
      bar.push({ pitch, rhythm: pattern[noteIndex] });
      previous = pitch;
    }

    bars.push(bar);
  }

  if (key.id === "a-minor" && !hasGSharp) {
    const barIndex = randomItem([1, 2]);
    const noteIndex = randomIndex(bars[barIndex].length);
    bars[barIndex][noteIndex] = {
      ...bars[barIndex][noteIndex],
      pitch: Math.random() < 0.5 ? "G#4" : "G#5",
    };
  }

  return { id: Math.random().toString(36).slice(2), type, key, bars };
}

function getBarPositions(bar, startX, endX) {
  const items = bar.map((item) => ({ rhythmUnits: rhythmSpacing(item.rhythm) }));
  const totalUnits = items.reduce((sum, item) => sum + item.rhythmUnits, 0);
  const unit = Math.max(1, endX - startX) / Math.max(totalUnits, 1);
  let cursor = startX;

  return items.map((item) => {
    const x = cursor;
    cursor += item.rhythmUnits * unit;
    return x;
  });
}

function getStem(x, y, step, forcedDown = null, forcedEndY = null) {
  const down = forcedDown ?? stemDown(step);
  const stemX = down ? x - NOTE.rx : x + NOTE.rx;
  const stemEndY = forcedEndY ?? (down ? y + NOTE.stemLength : y - NOTE.stemLength);
  return { down, stemX, stemEndY };
}

function isQuaver(note) {
  return note?.rhythm === "quaver";
}

function getQuaverGroups(bar) {
  const groups = [];
  let index = 0;
  while (index < bar.length) {
    if (!isQuaver(bar[index])) {
      index += 1;
      continue;
    }
    const start = index;
    while (index + 1 < bar.length && isQuaver(bar[index + 1])) index += 1;
    if (index > start) groups.push({ start, end: index });
    index += 1;
  }
  return groups;
}

function findGroup(groups, noteIndex) {
  return groups.find((group) => noteIndex >= group.start && noteIndex <= group.end) ?? null;
}

function getBeamDown(bar, group) {
  let up = 0;
  let down = 0;
  for (let index = group.start; index <= group.end; index += 1) {
    stemDown(noteStep(bar[index].pitch)) ? (down += 1) : (up += 1);
  }
  return down > up;
}

function getBeamEnds(bar, group, positions, down) {
  const startStep = noteStep(bar[group.start].pitch);
  const endStep = noteStep(bar[group.end].pitch);
  const startY = yForStep(startStep);
  const endY = yForStep(endStep);
  const startStem = getStem(positions[group.start], startY, startStep, down);
  const endStem = getStem(positions[group.end], endY, endStep, down);
  return {
    start: { x: startStem.stemX, y: startStem.stemEndY },
    end: { x: endStem.stemX, y: endStem.stemEndY },
  };
}

function beamYAtX(x, beam) {
  const ratio = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
  return beam.start.y + ratio * (beam.end.y - beam.start.y);
}

function playFeedbackSound(correct, celebration = false, medal = null) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;

  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;
  context.resume?.();
  master.gain.value = 0.18;
  master.connect(context.destination);

  function tone(freq, start, duration, type = "triangle", volume = 0.12) {
    const osc = context.createOscillator();
    const gain = context.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  }

  function trumpet(freq, start, duration, volume = 0.1) {
    tone(freq, start, duration, "sawtooth", volume);
    tone(freq * 1.002, start, duration * 0.96, "square", volume * 0.32);
    tone(freq * 2, start, duration * 0.75, "triangle", volume * 0.16);
  }

  function medalPhrase(root, chord, start, beats = 4) {
    const beat = 0.6;
    const triplet = 0.13;
    const finalDuration = beats === 2 ? 0.72 : 1.95;
    chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
    trumpet(root, start, triplet, 0.11);
    trumpet(root, start + triplet, triplet, 0.11);
    trumpet(root, start + triplet * 2, triplet, 0.11);
    trumpet(root, start + 0.42, finalDuration, 0.13);
  }

  if (!correct) {
    tone(196, now, 0.32, "sawtooth", 0.06);
    tone(185, now + 0.04, 0.38, "triangle", 0.05);
    tone(174, now + 0.08, 0.45, "sine", 0.04);
  } else if (celebration) {
    if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now);
    if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now);
    if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now);
    if (medal === "platinum") {
      medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
      medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
      medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
    }
  } else {
    randomItem([[523.25, 659.25, 783.99], [587.33, 739.99, 880], [659.25, 830.61, 987.77]]).forEach((freq, index) => {
      tone(freq, now + index * 0.045, 0.42, "triangle", index === 2 ? 0.085 : 0.07);
      tone(freq * 2, now + index * 0.045, 0.24, "sine", 0.025);
    });
  }

  window.setTimeout(() => {
    try {
      context.close();
    } catch {}
  }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
}

function useInjectedStyles() {
  useEffect(() => {
    if (document.getElementById("key-signatures-style")) return;
    const style = document.createElement("style");
    style.id = "key-signatures-style";
    style.innerHTML = `
      button { -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.08s ease, filter 0.08s ease, background-color 0.12s ease, box-shadow 0.12s ease; cursor: pointer; }
      button:hover { transform: translateY(-1px) scale(1.01); filter: brightness(1.08); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
      button:active { transform: scale(0.96); filter: brightness(0.92); }
      button:disabled { cursor: not-allowed; opacity: 0.5; }
      button:focus-visible { outline: 2px solid rgba(22,163,74,0.35); outline-offset: 2px; }
      @keyframes medalShine { 0%,100% { transform: scale(1) rotate(-4deg); filter: drop-shadow(0 0 0 rgba(250,204,21,0)); } 50% { transform: scale(1.16) rotate(4deg); filter: drop-shadow(0 0 10px rgba(250,204,21,.9)); } }
      @keyframes confettiDrop { 0% { transform: translateY(-12px) rotate(0deg); opacity: 0; } 12% { opacity: 1; } 100% { transform: translateY(72px) rotate(260deg); opacity: 0; } }
      @keyframes incorrectDropShake { 0% { transform: translateY(-28px); opacity: 0; } 55% { transform: translateY(0); opacity: 1; } 68% { transform: translateX(-5px); } 78% { transform: translateX(5px); } 88% { transform: translateX(-3px); } 100% { transform: translateX(0); opacity: 1; } }
      @keyframes correctFade { 0% { transform: translateY(-18px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes feedbackFadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }
    `;
    document.head.appendChild(style);
  }, []);
}

function LedgerLines({ x, step }) {
  const lines = [];
  if (step <= -2) lines.push(yForStep(-2));
  if (step >= 10) lines.push(yForStep(10));

  return (
    <g pointerEvents="none">
      {lines.map((y) => (
        <line key={y} x1={x - 21} x2={x + 21} y1={y} y2={y} stroke="currentColor" strokeWidth="1.4" />
      ))}
    </g>
  );
}

function Staff() {
  return (
    <g>
      {[0, 1, 2, 3, 4].map((line) => (
        <line key={line} x1={STAFF.left} x2={STAFF.right} y1={STAFF.top + line * STAFF.gap} y2={STAFF.top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.5" />
      ))}
      {[1, 2].map((bar) => {
        const x = STAFF.musicStartX + ((STAFF.right - STAFF.musicStartX) / BAR_COUNT) * bar - (bar === 1 ? 27 : 22);
        return <line key={bar} x1={x} x2={x} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.5" />;
      })}
      <line x1={STAFF.right} x2={STAFF.right} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="2.2" />
      <text x={STAFF.clefX} y={STAFF.top + 62} fontSize="190" fontFamily="serif" dominantBaseline="middle">{TREBLE_CLEF}</text>
      <g fontFamily="serif" fontWeight="900" fontSize="66" textAnchor="middle">
        <text x={STAFF.timeX} y={STAFF.top + 45}>4</text>
        <text x={STAFF.timeX} y={STAFF.top + 87}>4</text>
      </g>
    </g>
  );
}

function KeySignature({ signature }) {
  if (signature === "sharp") {
    return <text x={STAFF.keyX} y={yForStep(8) + 15} fontSize="51" fontFamily="serif" fontWeight="900">♯</text>;
  }
  if (signature === "flat") {
    return <text x={STAFF.keyX - 5} y={yForStep(4) + 11} fontSize="51" fontFamily="serif" fontWeight="900">♭</text>;
  }
  return null;
}

function BuildKeySignatureLayer({ question, selectedAccidental, placedAccidental, hoverStep, setHoverStep, onPlaceAccidental, feedback }) {
  const [draggingAccidental, setDraggingAccidental] = useState(null);
  const activeGlyph = accidentalGlyph(selectedAccidental);
  const placedGlyph = accidentalGlyph(placedAccidental?.type);
  const expected = expectedBuildAccidental(question.key.id);
  const expectedGlyph = accidentalGlyph(expected?.type);
  const showingFeedback = Boolean(feedback);
  const shouldShowExpected = showingFeedback && expected && !feedback.correct;

  function pointerToSvg(event) {
    const svg = event.currentTarget.ownerSVGElement ?? event.currentTarget;
    const rect = svg.getBoundingClientRect();
    return {
      x: ((event.clientX - rect.left) / rect.width) * SVG.width,
      y: ((event.clientY - rect.top) / rect.height) * SVG.height,
    };
  }

  function accidentalFromPointer(event) {
    if (!selectedAccidental || showingFeedback) return null;
    const pointer = pointerToSvg(event);
    const touchOffset = event.pointerType === "touch" ? 44 : 0;
    const effectiveY = pointer.y - touchOffset;
    const rawStep = Math.round((STAFF.top + STAFF.gap * 4 - effectiveY) / (STAFF.gap / 2));
    return { type: selectedAccidental, step: clamp(rawStep, -2, 10) };
  }

  function handlePointerMove(event) {
    if (showingFeedback) return;
    if (draggingAccidental) {
      event.preventDefault();
      const next = accidentalFromPointer(event);
      if (next) {
        setDraggingAccidental(next);
        setHoverStep(next.step);
      }
      return;
    }
    const next = accidentalFromPointer(event);
    setHoverStep(next ? next.step : null);
  }

  function handlePointerDown(event) {
    if (showingFeedback || !selectedAccidental) return;
    const next = accidentalFromPointer(event);
    if (!next) return;
    event.preventDefault();
    event.currentTarget.setPointerCapture?.(event.pointerId);
    setDraggingAccidental(next);
    setHoverStep(next.step);
  }

  function handlePointerUp(event) {
    if (showingFeedback || !draggingAccidental) return;
    event.preventDefault();
    event.currentTarget.releasePointerCapture?.(event.pointerId);
    const finalAccidental = accidentalFromPointer(event) ?? draggingAccidental;
    onPlaceAccidental(finalAccidental.step);
    setDraggingAccidental(null);
    setHoverStep(null);
  }

  function cancelPointer() {
    setDraggingAccidental(null);
    setHoverStep(null);
  }

  return (
    <g>
      {activeGlyph && hoverStep !== null && !placedAccidental && !showingFeedback && !draggingAccidental && (
        <text x={accidentalX(selectedAccidental)} y={accidentalY(selectedAccidental, hoverStep)} fontSize="58" fontFamily="serif" fontWeight="900" opacity="0.45" pointerEvents="none">
          {activeGlyph}
        </text>
      )}

      {draggingAccidental && activeGlyph && (
        <text x={accidentalX(draggingAccidental.type)} y={accidentalY(draggingAccidental.type, draggingAccidental.step)} fontSize="58" fontFamily="serif" fontWeight="900" fill="currentColor" opacity="0.82" pointerEvents="none">
          {activeGlyph}
        </text>
      )}

      {placedGlyph && (
        <text x={accidentalX(placedAccidental.type)} y={accidentalY(placedAccidental.type, placedAccidental.step)} fontSize="51" fontFamily="serif" fontWeight="900" fill={showingFeedback ? (feedback.correct ? COLOUR.green : COLOUR.red) : "currentColor"} pointerEvents="none">
          {placedGlyph}
        </text>
      )}

      {shouldShowExpected && (
        <text x={accidentalX(expected.type, 32)} y={accidentalY(expected.type, expected.step)} fontSize="51" fontFamily="serif" fontWeight="900" fill={COLOUR.green} pointerEvents="none">
          {expectedGlyph}
        </text>
      )}

      <rect
        x={STAFF.keyX - 58}
        y={STAFF.top - 34}
        width="126"
        height={STAFF.gap * 4 + 68}
        fill="transparent"
        pointerEvents="all"
        className="touch-none"
        style={{ touchAction: "none", WebkitUserSelect: "none", userSelect: "none", overscrollBehavior: "contain", cursor: selectedAccidental && !showingFeedback ? "pointer" : "default" }}
        onPointerMove={handlePointerMove}
        onPointerLeave={() => {
          if (!draggingAccidental) setHoverStep(null);
        }}
        onPointerDown={handlePointerDown}
        onPointerUp={handlePointerUp}
        onPointerCancel={cancelPointer}
      />
    </g>
  );
}

function RhythmNote({ x, y, step, rhythm, pitch, accidental = false, showFlag = true, forcedDown = null, forcedStemEndY = null }) {
  const open = rhythm === "minim" || rhythm === "semibreve";
  const hasStem = rhythm !== "semibreve";
  const stem = getStem(x, y, step, forcedDown, forcedStemEndY);
  const dotY = Math.abs(step % 2) === 1 ? y - 3 : y - 7;
  const flagPath = stem.down
    ? `M ${stem.stemX} ${stem.stemEndY} C ${stem.stemX + 21} ${stem.stemEndY - 8}, ${stem.stemX + 20} ${stem.stemEndY - 24}, ${stem.stemX + 5} ${stem.stemEndY - 31}`
    : `M ${stem.stemX} ${stem.stemEndY} C ${stem.stemX + 21} ${stem.stemEndY + 8}, ${stem.stemX + 20} ${stem.stemEndY + 24}, ${stem.stemX + 5} ${stem.stemEndY + 31}`;

  return (
    <g pointerEvents="none">
      {accidental && (
        <text x={pitch && pitch.includes("G#") ? x - 38 : x - 36} y={pitch && pitch.includes("G#") ? y + 14 : y + 12} fontSize="44" fontFamily="serif" fontWeight="900">♯</text>
      )}
      <ellipse cx={x} cy={y} rx={NOTE.rx} ry={NOTE.ry} transform={`rotate(-18 ${x} ${y})`} fill={open ? "transparent" : "currentColor"} stroke="currentColor" strokeWidth="2" />
      {hasStem && <line x1={stem.stemX} x2={stem.stemX} y1={y} y2={stem.stemEndY} stroke="currentColor" strokeWidth="1.8" />}
      {rhythm === "dotted-crotchet" && <circle cx={x + 23} cy={dotY} r="3.6" fill="currentColor" />}
      {rhythm === "quaver" && showFlag && <path d={flagPath} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />}
    </g>
  );
}

function Passage({ bars }) {
  const barWidth = (STAFF.right - STAFF.musicStartX) / BAR_COUNT;

  return (
    <g>
      {bars.map((bar, barIndex) => {
        const startX = STAFF.musicStartX + barIndex * barWidth + (barIndex === 0 ? 2 : 15);
        const endX = STAFF.musicStartX + (barIndex + 1) * barWidth - 5;
        const positions = getBarPositions(bar, startX, endX);
        const groups = getQuaverGroups(bar);
        let accidentalShown = false;

        return (
          <g key={barIndex}>
            {bar.map((note, noteIndex) => {
              const x = positions[noteIndex];
              const step = noteStep(note.pitch);
              const y = yForStep(step);
              const group = findGroup(groups, noteIndex);
              const beamed = Boolean(group);
              const beamDown = group ? getBeamDown(bar, group) : null;
              let beam = null;
              let forcedStemEndY = null;

              if (group) {
                beam = getBeamEnds(bar, group, positions, beamDown);
                const stem = getStem(x, y, step, beamDown);
                forcedStemEndY = beamYAtX(stem.stemX, beam);
              }

              const showAccidental = note.pitch && note.pitch.includes("#") && !accidentalShown;
              if (note.pitch && note.pitch.includes("#")) accidentalShown = true;

              return (
                <g key={`${barIndex}-${noteIndex}`}>
                  <LedgerLines x={x} step={step} />
                  <RhythmNote x={x} y={y} step={step} rhythm={note.rhythm} pitch={note.pitch} accidental={showAccidental} showFlag={!beamed} forcedDown={beamDown} forcedStemEndY={forcedStemEndY} />
                  {beam && group?.start === noteIndex && <line x1={beam.start.x - 1} x2={beam.end.x + 1} y1={beam.start.y} y2={beam.end.y} stroke="currentColor" strokeWidth="7.2" />}
                </g>
              );
            })}
          </g>
        );
      })}
    </g>
  );
}

function MusicScore({ question, selectedAccidental, placedAccidental, hoverStep, setHoverStep, onPlaceAccidental, feedback }) {
  return (
    <svg viewBox={`0 0 ${SVG.width} ${SVG.height}`} className="h-auto w-full select-none overflow-visible">
      <rect width={SVG.width} height={360} fill="white" />
      <Staff />
      {question.type === "build-key" ? (
        <BuildKeySignatureLayer question={question} selectedAccidental={selectedAccidental} placedAccidental={placedAccidental} hoverStep={hoverStep} setHoverStep={setHoverStep} onPlaceAccidental={onPlaceAccidental} feedback={feedback} />
      ) : (
        <KeySignature signature={question.key.signature} />
      )}
      <Passage bars={question.bars} />
    </svg>
  );
}

function getStreakMedal(streak) {
  if (streak >= 30) return { emoji: "💎", bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
  if (streak >= 20) return { emoji: "🥇", bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
  if (streak >= 15) return { emoji: "🥈", bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
  if (streak >= 10) return { emoji: "🥉", bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
  return null;
}

function StatCard({ label, value, footer, progress = null, medal = null, variant = "default", confettiKey = 0 }) {
  const safeProgress = progress == null ? null : clamp(progress, 0, 100);
  const fillHeight = safeProgress == null || safeProgress <= 0 ? 0 : safeProgress;
  const fillColour = safeProgress == null ? "transparent" : safeProgress < 50 ? "rgba(220, 38, 38, 0.38)" : safeProgress < 70 ? "rgba(255, 120, 0, 0.42)" : "rgba(22, 163, 74, 0.38)";
  const isStreak = variant === "streak";

  return (
    <div className={isStreak ? "relative overflow-visible bg-transparent p-3" : `relative overflow-hidden rounded-xl border border-stone-200 p-3 shadow-sm ${medal ? medal.bg : "bg-stone-50"}`}>
      {isStreak && confettiKey > 0 && (
        <div key={confettiKey} className="pointer-events-none absolute inset-0 z-20 overflow-visible">
          {Array.from({ length: 18 }).map((_, index) => (
            <span
              key={index}
              className="absolute block h-1.5 w-1 rounded-sm"
              style={{
                left: `${8 + ((index * 19) % 84)}%`,
                top: "-8px",
                backgroundColor: ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa"][index % 5],
                animation: `confettiDrop ${0.85 + (index % 5) * 0.12}s ease-out forwards`,
                animationDelay: `${(index % 6) * 0.035}s`,
              }}
            />
          ))}
        </div>
      )}
      {safeProgress !== null && <div className="absolute bottom-0 left-0 right-0 transition-all duration-700" style={{ height: `${fillHeight}%`, background: fillColour }} />}
      <div className="relative z-10 text-center">
        <div className="text-xs uppercase tracking-wide text-stone-500">{label}</div>
        <div className={`text-xl font-semibold leading-tight ${isStreak && medal ? medal.text : ""}`}>{value}</div>
        {footer && <div className="mt-1 text-[13px] leading-none text-stone-500">{footer}</div>}
      </div>
      {isStreak && <div className="pointer-events-none absolute -right-[12px] top-[12px] z-[999] select-none text-3xl leading-none" style={medal?.emoji ? { animation: "medalShine 1.4s ease-in-out infinite" } : { opacity: 0.16, filter: "grayscale(1) brightness(0.7)" }}>{medal?.emoji ?? "🥉"}</div>}
    </div>
  );
}

function FeedbackBanner({ feedback, fading = false }) {
  if (!feedback) return null;
  return (
    <div className="relative flex w-full items-center justify-center text-center">
      <div className={`flex w-[300px] flex-col items-center justify-center whitespace-nowrap text-xl font-bold ${feedback.correct ? "text-green-600" : "text-red-600"}`} style={{ animation: fading ? "feedbackFadeOut .28s ease-out forwards" : feedback.correct ? "correctFade .55s ease-out forwards" : "incorrectDropShake .55s ease-out forwards" }}>
        <span className="translate-y-[4px]">{feedback.correct ? "Correct" : "Incorrect"}</span>
        {!feedback.correct && <span className="mt-2 inline-flex -translate-x-[2px] items-center gap-0 text-sm font-semibold text-black"><TapIcon /><span>Click or tap anywhere to continue</span></span>}
      </div>
    </div>
  );
}

function TapIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none" aria-hidden="true" className="shrink-0 translate-x-[6px]">
      <path d="M16 15.5v-8.2a1.7 1.7 0 0 1 3.4 0v8.2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
      <path d="M19.4 15.5v-3.2a1.55 1.55 0 0 1 3.1 0v5.4c0 4.2-2.7 7.3-6.9 7.3h-1.1c-2.1 0-3.2-.9-4.4-2.5l-2.5-3.4a1.55 1.55 0 0 1 2.4-1.95l1.8 1.85V15.5a1.7 1.7 0 0 1 3.4 0v2.2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx="17.7" cy="8" r="4.9" stroke="currentColor" strokeWidth="1.6" opacity="0.45" />
    </svg>
  );
}

function HelpPanel() {
  const [page, setPage] = useState(0);
  const pages = [
    ["Instructions", "Name the key from the music, or create the requested key signature by selecting a sharp or flat and placing it in the correct position on the stave. "],    ["C major", "C major has no sharps or flats in the key signature."],
    ["A minor", "A minor has no sharps or flats in the key signature, but the music can include raised G sharps as accidentals."],
    ["G major", "G major has one sharp: F sharp. The sharp is placed on the top line of the treble stave."],
    ["F major", "F major has one flat: B flat. The flat is placed on the middle line of the treble stave."],
  ];
  const [title, body] = pages[page];

  return (
    <div>
      <h2 className="mb-3 text-center text-base font-semibold">Help</h2>
      <div className="min-h-[118px] rounded-xl border border-stone-200 bg-stone-50 p-4">
        <h3 className="text-sm font-bold text-stone-800">{title}</h3>
        <p className="mt-2 text-sm leading-relaxed text-stone-700">{body}</p>
      </div>
      <div className="mt-3 flex items-center justify-between">
        <button type="button" onClick={() => setPage((value) => Math.max(0, value - 1))} disabled={page === 0} className="flex h-9 w-[46px] items-center justify-center rounded-xl border border-stone-300 bg-white text-lg font-bold text-stone-800 disabled:opacity-35">←</button>
        <div className="text-sm font-semibold text-stone-600">{page + 1} / {pages.length}</div>
        <button type="button" onClick={() => setPage((value) => Math.min(pages.length - 1, value + 1))} disabled={page === pages.length - 1} className="flex h-9 w-[46px] items-center justify-center rounded-xl border border-stone-300 bg-white text-lg font-bold text-stone-800 disabled:opacity-35">→</button>
      </div>
    </div>
  );
}

function AppIcon() {
  return (
    <div className="flex h-14 w-14 items-center justify-center overflow-hidden rounded-2xl border border-stone-200 bg-stone-50">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="18" y="31" fontSize="60" fontFamily="serif" fill="black" textAnchor="middle" dominantBaseline="middle">{TREBLE_CLEF}</text>
        <text x="39" y="31" fontSize="40" fontFamily="serif" fill="black" textAnchor="middle" dominantBaseline="middle">♯</text>
      </svg>
    </div>
  );
}

function ToggleRow({ glyph, label, enabled, disabled = false, onToggle }) {
  return (
    <button
      type="button"
      disabled={disabled}
      onClick={onToggle}
      className="mb-2.5 flex min-h-[52px] w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-[14px] py-[10px] text-left hover:bg-stone-100 disabled:opacity-50"
    >
      <span className="flex items-center gap-2 text-sm font-semibold text-stone-800">
        <span className="flex h-7 w-7 items-center justify-center text-lg leading-none">{glyph}</span>
        <span>{label}</span>
      </span>
      <span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${enabled ? "bg-green-600" : "bg-stone-400"}`}>
        <span className={`h-4 w-4 rounded-full bg-white transition ${enabled ? "translate-x-5" : "translate-x-0"}`} />
      </span>
    </button>
  );
}

function MenuRows({ resetScore, enableKeyNaming, setEnableKeyNaming, enableKeyBuilding, setEnableKeyBuilding }) {
  return (
    <>
      <ToggleRow
        glyph={<span className="font-serif text-[36px] leading-none">{TREBLE_CLEF}</span>}
        label="Identify Key Signature"
        enabled={enableKeyNaming}
        disabled={enableKeyNaming && !enableKeyBuilding}
        onToggle={() => setEnableKeyNaming((value) => !value)}
      />
      <ToggleRow
        glyph={<span className="font-serif text-[28px] font-black leading-none">♯</span>}
        label="Create Key Signature"
        enabled={enableKeyBuilding}
        disabled={enableKeyBuilding && !enableKeyNaming}
        onToggle={() => setEnableKeyBuilding((value) => !value)}
      />
      <button type="button" onClick={resetScore} className="mt-2 w-full rounded-xl border border-red-500 bg-white px-[18px] py-[10px] text-sm font-semibold text-red-600 hover:bg-red-50">↺ Reset score</button>
    </>
  );
}

function App() {
  useInjectedStyles();

  const [question, setQuestion] = useState(() => createQuestion());
  const [questionVisible, setQuestionVisible] = useState(true);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [selectedAccidental, setSelectedAccidental] = useState(null);
  const [placedAccidental, setPlacedAccidental] = useState(null);
  const [hoverStep, setHoverStep] = useState(null);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);
  const [enableKeyNaming, setEnableKeyNaming] = useState(true);
  const [enableKeyBuilding, setEnableKeyBuilding] = useState(true);

  const customiseRef = useRef(null);
  const helpRef = useRef(null);
  const nextTimer = useRef(null);

  useEffect(() => {
    function closeMenus(event) {
      if (customiseOpen && !customiseRef.current?.contains(event.target)) setCustomiseOpen(false);
      if (helpOpen && !helpRef.current?.contains(event.target)) setHelpOpen(false);
    }
    document.addEventListener("pointerdown", closeMenus, true);
    return () => document.removeEventListener("pointerdown", closeMenus, true);
  }, [customiseOpen, helpOpen]);

  useEffect(() => () => window.clearTimeout(nextTimer.current), []);

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const locked = Boolean(feedback);
  const isBuildKeyQuestion = question.type === "build-key";
  const expectedAccidental = expectedBuildAccidental(question.key.id);
  const streakMedal = getStreakMedal(streak);
  const showNoAccidentalAnswer = isBuildKeyQuestion && feedback && !feedback.correct && expectedAccidental === null;
  const instruction = isBuildKeyQuestion ? (
    <span>Create the key signature of <strong>{question.key.label}</strong>.</span>
  ) : (
    <span>Name the key of this excerpt.</span>
  );

  function clearNextTimer() {
    if (nextTimer.current) {
      window.clearTimeout(nextTimer.current);
      nextTimer.current = null;
    }
  }

  function newQuestion() {
    clearNextTimer();
    setQuestionVisible(false);
    window.setTimeout(() => {
      setQuestion(createQuestion({ identify: enableKeyNaming, build: enableKeyBuilding }));
      setSelectedAnswer(null);
      setSelectedAccidental(null);
      setPlacedAccidental(null);
      setHoverStep(null);
      setFeedback(null);
      setFeedbackFading(false);
      setHelpOpen(false);
      setQuestionVisible(true);
    }, 220);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback.correct || feedbackFading) return;
    setFeedbackFading(true);
    window.setTimeout(() => newQuestion(), 280);
  }

  function updateScore(isCorrect) {
    const nextStreak = isCorrect ? streak + 1 : 0;
    playFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });
    setHelpOpen(false);

    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }

    if (isCorrect) {
      setFeedbackFading(false);
      nextTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
      nextTimer.current = window.setTimeout(() => newQuestion(), 2000);
    }
  }

  function answerQuestion(keyId) {
    if (locked) return;
    setSelectedAnswer(keyId);
    updateScore(keyId === question.key.id);
  }

  function placeBuildAccidental(step) {
    if (locked || !selectedAccidental) return;
    setPlacedAccidental({ type: selectedAccidental, step });
  }

  function clearBuildAccidental() {
    if (locked) return;
    setPlacedAccidental(null);
  }

  function submitBuildAnswer() {
    if (locked) return;
    const isCorrect = expectedAccidental === null
      ? placedAccidental === null
      : placedAccidental?.type === expectedAccidental.type && placedAccidental?.step === expectedAccidental.step;
    updateScore(isCorrect);
  }

  function answerButtonClass(keyId) {
    const base = "rounded-xl border px-4 py-3 text-[1.05rem] font-bold transition";
    if (!feedback) return `${base} ${selectedAnswer === keyId ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`;
    if (keyId === question.key.id) return `${base} border-green-600 bg-green-600 text-white`;
    if (keyId === selectedAnswer && keyId !== question.key.id) return `${base} border-red-600 bg-red-600 text-white`;
    return `${base} border-stone-200 bg-stone-100 text-stone-400`;
  }

  return (
    <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2">
      <div className="mx-auto max-w-6xl">
        <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm">
          <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div className="flex items-center gap-4">
              <AppIcon />
              <div>
                <h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Key Signatures</h1>
                <p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Scales and key signatures — C major, G major, F major, A minor.</p>
              </div>
            </div>

            <div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end">
              <StatCard variant="score" label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${accuracy}%`} progress={accuracy} />
              <div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${streakMedal?.bg ?? "bg-stone-50"}`}>
                <StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} medal={streakMedal} confettiKey={confettiKey} />
                <div className="relative z-0 flex min-h-[52px] min-w-[64px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700">
                  <div className="flex items-center gap-1"><span>💎</span><span className="text-cyan-500">30</span></div>
                  <div className="mt-1">🥇 <span className="text-yellow-500">20</span></div>
                  <div className="mt-1">🥈 <span className="text-slate-500">15</span></div>
                  <div className="mt-1">🥉 <span className="text-amber-700">10</span></div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <main
          className="relative -mt-[10px] overflow-hidden rounded-2xl border border-stone-200 bg-white px-4 pb-[18px] pt-[10px] shadow-sm md:h-auto md:overflow-hidden md:px-6 md:pb-[18px] md:pt-[14px]"
          onPointerDown={() => {
            if (feedback && !feedback.correct) fadeToNextQuestion();
          }}
        >
          <div className="relative z-20 mb-2.5 flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-2">
              <div className="relative" ref={customiseRef}>
                <button type="button" onClick={() => setCustomiseOpen((value) => !value)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>
                {customiseOpen && (
                  <div className="absolute left-0 z-20 mt-2 w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
                    <h2 className="mb-3 text-center text-base font-semibold">Customise</h2>
                    <MenuRows
                      resetScore={resetScore}
                      enableKeyNaming={enableKeyNaming}
                      setEnableKeyNaming={setEnableKeyNaming}
                      enableKeyBuilding={enableKeyBuilding}
                      setEnableKeyBuilding={setEnableKeyBuilding}
                    />
                  </div>
                )}
              </div>

              <div className="relative" ref={helpRef}>
                <button type="button" onClick={() => setHelpOpen((value) => !value)} className="flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">💡 <span>Help</span></button>
                {helpOpen && (
                  <div className="absolute left-0 top-12 z-20 w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
                    <HelpPanel />
                  </div>
                )}
              </div>
            </div>

            <button type="button" onClick={() => newQuestion()} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button>
            <div className="pointer-events-none absolute inset-x-0 top-1/2 z-30 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading} /></div>
          </div>

          <div className={`relative -top-[60px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <MusicScore
              question={question}
              selectedAccidental={selectedAccidental}
              placedAccidental={placedAccidental}
              hoverStep={hoverStep}
              setHoverStep={setHoverStep}
              onPlaceAccidental={placeBuildAccidental}
              feedback={feedback}
            />
          </div>

          <div className="relative z-10 mt-10 min-h-[118px] overflow-visible rounded-xl border border-stone-200 bg-stone-50 p-4 shadow-md md:mt-[-213px] md:mx-3">
            <div className="space-y-3 text-stone-900">
              <p className="text-base font-semibold leading-tight">{instruction}</p>
              {showNoAccidentalAnswer && <div className="mt-2 text-center text-base font-bold text-green-600">Correct answer: no sharps or flats</div>}
            </div>

            {isBuildKeyQuestion ? (
              <div className="mt-4 flex flex-wrap items-end gap-2">
                <div className="flex items-end gap-2">
                  <button type="button" disabled={locked} onClick={() => setSelectedAccidental("sharp")} className={`relative flex h-[64px] w-[64px] shrink-0 items-center justify-center overflow-hidden rounded-xl border text-3xl font-normal leading-none transition ${selectedAccidental === "sharp" ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`}>
                    <span className="pointer-events-none absolute left-1/2 top-1/2 block -translate-x-1/2 -translate-y-1/2 scale-[1.58] font-light leading-none">♯</span>
                  </button>
                  <button type="button" disabled={locked} onClick={() => setSelectedAccidental("flat")} className={`relative flex h-[64px] w-[64px] shrink-0 items-center justify-center overflow-hidden rounded-xl border text-3xl font-normal leading-none transition ${selectedAccidental === "flat" ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`}>
                    <span className="pointer-events-none absolute left-1/2 top-1/2 block -translate-x-1/2 -translate-y-1/2 scale-[1.58] font-light leading-none">♭</span>
                  </button>
                </div>

                <div className="ml-auto flex items-end gap-2 pt-0">
                  <button type="button" disabled={locked || !placedAccidental} onClick={clearBuildAccidental} className="rounded-xl border border-stone-300 bg-white px-5 py-3 text-sm font-bold transition hover:bg-stone-100">Clear</button>
                  <button type="button" disabled={locked} onClick={submitBuildAnswer} className="rounded-xl border border-green-600 bg-green-600 px-5 py-3 text-sm font-bold text-white transition hover:bg-green-700">Confirm</button>
                </div>
              </div>
            ) : (
              <div className="mt-4 grid grid-cols-2 gap-2 md:grid-cols-4">
                {KEYS.map((key) => (
                  <button key={key.id} type="button" disabled={locked} onClick={() => answerQuestion(key.id)} className={answerButtonClass(key.id)}>{key.label}</button>
                ))}
              </div>
            )}
          </div>
        </main>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
