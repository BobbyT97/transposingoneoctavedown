<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Key Signatures</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  svg { display:block; width:100%; height:auto; }
  button:disabled { opacity:.5; cursor:not-allowed; }
</style>
</head>
<body class="min-h-screen bg-stone-50 text-stone-950 p-4 md:p-8">
<div class="mx-auto max-w-5xl">
  <header class="mb-5 rounded-2xl bg-white shadow-sm border border-stone-200 p-5">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-semibold tracking-tight">Key Signatures</h1>
        <p class="mt-2 text-stone-700">Identify the key signature from the music shown.</p>
      </div>
      <div class="grid grid-cols-3 gap-2 text-center min-w-[280px]">
        <div class="rounded-xl border bg-stone-50 p-3"><div class="text-xs uppercase tracking-wide text-stone-500">Score</div><div id="score" class="text-xl font-semibold">0/0</div></div>
        <div class="rounded-xl border bg-stone-50 p-3"><div class="text-xs uppercase tracking-wide text-stone-500">Accuracy</div><div id="accuracy" class="text-xl font-semibold">0%</div></div>
        <div class="rounded-xl border bg-stone-50 p-3"><div class="text-xs uppercase tracking-wide text-stone-500">Streak</div><div id="streak" class="text-xl font-semibold">0</div></div>
      </div>
    </div>
  </header>

  <main class="rounded-2xl bg-white shadow-sm border border-stone-200 p-4 md:p-6">
    <div class="mb-4 flex flex-col md:flex-row md:justify-between md:items-center gap-3">
      <div class="flex gap-2">
        <button id="practiceBtn" class="rounded-xl border px-4 py-2 text-sm font-semibold">Practice</button>
        <button id="examBtn" class="rounded-xl border px-4 py-2 text-sm font-semibold">Exam Style Questions</button>
      </div>
      <div class="flex justify-end items-center gap-2">
        <div id="helpBox" class="hidden mr-2 w-64 rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 text-sm font-medium text-blue-950 shadow"></div>
        <button id="helpBtn" title="Help" aria-label="Help" class="h-10 w-10 rounded-full border text-lg font-bold">?</button>
        <button id="resetBtn" class="rounded-xl bg-red-600 text-white px-4 py-2 text-sm font-medium hover:bg-red-700">Reset score</button>
      </div>
    </div>

    <div id="answers" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4"></div>

    <div class="relative overflow-hidden rounded-xl border border-stone-200 bg-white">
      <svg id="music" viewBox="0 0 720 300" aria-label="Key signature identification exercise">
        <rect x="0" y="0" width="720" height="300" fill="white"></rect>
        <g id="notation"></g>
      </svg>
    </div>

    <div id="feedback" class="mt-5 min-h-[54px] rounded-xl border border-stone-200 bg-stone-50 p-4 text-stone-700">Choose the correct key.</div>
    <div id="bestStreak" class="mt-4 text-sm text-stone-600">Best streak: 0</div>
  </main>
</div>

<script>
const VIEWBOX_WIDTH=720, VIEWBOX_HEIGHT=300, STAFF_LEFT=20, STAFF_RIGHT=700, BAR_COUNT=3;
const TREBLE_TOP=120, LINE_GAP=11.2, NOTE_RX=6.6, NOTE_RY=4.7, STEM_LENGTH=31;
const CLEF_X=STAFF_LEFT+6, KEY_SIG_X=STAFF_LEFT+36, TIME_SIG_X=STAFF_LEFT+67, MUSIC_START_X=STAFF_LEFT+78;
const TREBLE_CLEF=String.fromCodePoint(0x1d11e), TICK=String.fromCodePoint(0x2714), CROSS=String.fromCodePoint(0x2716);
const KEYS=[{id:'c-major',label:'C major',signature:'none'},{id:'a-minor',label:'A minor',signature:'none'},{id:'g-major',label:'G major',signature:'sharp'},{id:'f-major',label:'F major',signature:'flat'}];
const NOTE_STEPS={C4:-2,D4:-1,E4:0,F4:1,G4:2,A4:3,B4:4,C5:5,D5:6,E5:7,F5:8,G5:9,A5:10};
const KEY_POOLS={
 'c-major':['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5'],
 'a-minor':['G4','G#4','A4','B4','C5','D5','E5','F5','G5','G#5','A5'],
 'g-major':['G4','A4','B4','C5','D5','E5','F5','G5','A5'],
 'f-major':['F4','G4','A4','B4','C5','D5','E5','F5','G5']
};
const TONIC_START={'c-major':'C4','a-minor':'A4','g-major':'G4','f-major':'F4'};
const RHYTHMS=[{id:'semibreve',beats:4,spacing:8},{id:'minim',beats:2,spacing:4},{id:'dotted-crotchet',beats:1.5,spacing:3},{id:'crotchet',beats:1,spacing:2},{id:'quaver',beats:.5,spacing:1}];
const STANDARD_BAR_PATTERNS=[['minim','crotchet','crotchet'],['crotchet','crotchet','minim'],['minim','minim'],['crotchet','crotchet','crotchet','crotchet'],['dotted-crotchet','quaver','crotchet','crotchet'],['crotchet','crotchet','dotted-crotchet','quaver'],['dotted-crotchet','quaver','dotted-crotchet','quaver'],['dotted-crotchet','quaver','minim'],['crotchet','quaver','quaver','crotchet','crotchet'],['quaver','quaver','quaver','quaver','minim'],['crotchet','quaver','quaver','quaver','quaver','crotchet'],['minim','quaver','quaver','quaver','quaver']];
const FINAL_BAR_PATTERNS=[...STANDARD_BAR_PATTERNS,['semibreve']];
let mode='exam', question=makeQuestion(), selectedAnswer=null, feedback=null, correct=0, attempted=0, streak=0, bestStreak=0, showHelp=false, timer=null;
const $=id=>document.getElementById(id);
const notation=$('notation'), answers=$('answers'), helpBox=$('helpBox'), helpBtn=$('helpBtn'), practiceBtn=$('practiceBtn'), examBtn=$('examBtn'), resetBtn=$('resetBtn');
function randomIndex(length){return Math.floor(Math.random()*length)}
function randomItem(items){return items[randomIndex(items.length)]}
function rhythmById(id){return RHYTHMS.find(r=>r.id===id)||RHYTHMS.find(r=>r.id==='crotchet')}
function noteBase(n){return n.replace('#','')}
function stepForNote(n){return NOTE_STEPS[noteBase(n)]??NOTE_STEPS.C5}
function yForStep(step){const bottom=TREBLE_TOP+LINE_GAP*4;return bottom-step*(LINE_GAP/2)}
function stemGoesDown(step){return step>4}
function spacingValue(id){return rhythmById(id).spacing}
function el(name,attrs={}){const e=document.createElementNS('http://www.w3.org/2000/svg',name);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function textEl(txt,attrs={}){const e=el('text',attrs);e.textContent=txt;return e}
function nearestPoolIndex(pool,prev){const base=noteBase(prev);const exact=pool.findIndex(n=>noteBase(n)===base);return exact>=0?exact:Math.floor(pool.length/2)}
function chooseNextNote(pool,prev){const i=nearestPoolIndex(pool,prev);let move=randomItem([-2,-1,0,0,1,2]);if(Math.random()<.08)move=Math.random()<.5?-7:7;return pool[Math.max(0,Math.min(pool.length-1,i+move))]}
function chooseBeamedQuaverNote(pool,prev){const i=nearestPoolIndex(pool,prev),moves=[];if(i>1)moves.push(-2);if(i>0)moves.push(-1);moves.push(0);if(i<pool.length-1)moves.push(1);if(i<pool.length-2)moves.push(2);return pool[i+randomItem(moves)]}
function makeBarRhythms(barIndex){return randomItem(barIndex===BAR_COUNT-1?FINAL_BAR_PATTERNS:STANDARD_BAR_PATTERNS)}
function makeQuestion(){const key=randomItem(KEYS),pool=KEY_POOLS[key.id],bars=[];let prev=TONIC_START[key.id],hasGSharp=false;for(let b=0;b<BAR_COUNT;b++){const pattern=makeBarRhythms(b),bar=[];for(let i=0;i<pattern.length;i++){let pitch;if(b===0&&i===0)pitch=TONIC_START[key.id];else{const isBeamed=pattern[i]==='quaver'&&pattern[i-1]==='quaver';pitch=isBeamed?chooseBeamedQuaverNote(pool,prev):chooseNextNote(pool,prev)}if(key.id==='a-minor'&&pitch.includes('G#'))hasGSharp=true;bar.push({pitch,rhythm:pattern[i]});prev=pitch}bars.push(bar)}if(key.id==='a-minor'&&!hasGSharp){const barIndex=randomItem([1,2]);const noteIndex=randomIndex(bars[barIndex].length);bars[barIndex][noteIndex]={...bars[barIndex][noteIndex],pitch:Math.random()<.5?'G#4':'G#5'}}return{key,bars}}
function getBarPositions(bar,startX,endX){const firstOffset=14,accUnits=1;let accShown=false;const items=bar.map(item=>{const firstAcc=item.pitch.includes('#')&&!accShown;if(item.pitch.includes('#'))accShown=true;return{rhythmUnits:spacingValue(item.rhythm),accidentalUnits:firstAcc?accUnits:0}});const total=items.reduce((t,i)=>t+i.rhythmUnits+i.accidentalUnits,0),unit=Math.max(1,endX-startX-firstOffset)/Math.max(total,1);let cursor=startX+firstOffset;return items.map(i=>{cursor+=i.accidentalUnits*unit;const x=cursor;cursor+=i.rhythmUnits*unit;return x})}
function getStemData(x,y,step,stemDownOverride=null,forcedY=null){const stemDown=stemDownOverride??stemGoesDown(step),stemX=stemDown?x-NOTE_RX+1:x+NOTE_RX-1,naturalEndY=stemDown?y+STEM_LENGTH:y-STEM_LENGTH;return{stemDown,stemX,stemEndY:forcedY??naturalEndY}}
function isQuaver(n){return n?.rhythm==='quaver'}
function getQuaverGroupBounds(bar,i){if(!isQuaver(bar[i]))return null;let start=i,end=i;while(start>0&&isQuaver(bar[start-1]))start--;while(end<bar.length-1&&isQuaver(bar[end+1]))end++;return end>start?{start,end}:null}
function getBeamedGroupStemDown(bar,g){let up=0,down=0;for(let i=g.start;i<=g.end;i++)stemGoesDown(stepForNote(bar[i].pitch))?down++:up++;return down>up}
function getBeamAnchorStep(bar,g,stemDown){let anchor=stepForNote(bar[g.start].pitch);for(let i=g.start;i<=g.end;i++){const step=stepForNote(bar[i].pitch);if(stemDown?step>anchor:step<anchor)anchor=step}return anchor}
function groupChangesDirection(steps){const dirs=[];for(let i=1;i<steps.length;i++){const d=Math.sign(steps[i]-steps[i-1]);if(d!==0)dirs.push(d)}return dirs.length>=2&&dirs.some(d=>d!==dirs[0])}
function getBeamLineYAtX(x,start,end){if(!start||!end||start.x===end.x)return start?.y??end?.y??null;const p=(x-start.x)/(end.x-start.x);return start.y+p*(end.y-start.y)}
function getBeamEnds(bar,g,positions,stemDown){const firstStep=stepForNote(bar[g.start].pitch),lastStep=stepForNote(bar[g.end].pitch),steps=[];for(let i=g.start;i<=g.end;i++)steps.push(stepForNote(bar[i].pitch));const shouldSlope=!groupChangesDirection(steps)&&firstStep!==lastStep,totalSlope=shouldSlope?Math.max(-8,Math.min(8,(lastStep-firstStep)*-2)):0,anchorStep=getBeamAnchorStep(bar,g,stemDown);let anchorIndex=g.start;for(let i=g.start;i<=g.end;i++){if(stepForNote(bar[i].pitch)===anchorStep){anchorIndex=i;break}}const startStem=getStemData(positions[g.start],yForStep(firstStep),firstStep,stemDown),endStem=getStemData(positions[g.end],yForStep(lastStep),lastStep,stemDown),anchorStem=getStemData(positions[anchorIndex],yForStep(anchorStep),anchorStep,stemDown),totalX=Math.max(1,endStem.stemX-startStem.stemX),slopePerX=totalSlope/totalX;return{start:{x:startStem.stemX,y:anchorStem.stemEndY-slopePerX*(anchorStem.stemX-startStem.stemX)},end:{x:endStem.stemX,y:anchorStem.stemEndY+slopePerX*(endStem.stemX-anchorStem.stemX)}}}
function drawStaffLines(g,left=STAFF_LEFT,right=STAFF_RIGHT,top=TREBLE_TOP,gap=LINE_GAP){for(let i=0;i<5;i++)g.appendChild(el('line',{x1:left,x2:right,y1:top+i*gap,y2:top+i*gap,stroke:'currentColor','stroke-width':'1.2'}))}
function drawBarLines(g){const barWidth=(STAFF_RIGHT-MUSIC_START_X)/BAR_COUNT;for(let i=0;i<BAR_COUNT;i++){const x=i===BAR_COUNT-1?STAFF_RIGHT:MUSIC_START_X+barWidth*(i+1);g.appendChild(el('line',{x1:x,x2:x,y1:TREBLE_TOP,y2:TREBLE_TOP+LINE_GAP*4,stroke:'currentColor','stroke-width':'1.2'}))}}
function drawLedgerLines(g,x,step){const lines=[];if(step<=-2)lines.push(yForStep(-2));if(step>=10)lines.push(yForStep(10));lines.forEach(y=>g.appendChild(el('line',{x1:x-14,x2:x+14,y1:y,y2:y,stroke:'currentColor','stroke-width':'1.2'})))}
function drawRhythmNote(g,{x,y,step,rhythm,accidental=false,showFlag=true,forcedStemEndY=null,stemDownOverride=null}){const isOpen=rhythm==='minim'||rhythm==='semibreve',hasStem=rhythm!=='semibreve',stem=getStemData(x,y,step,stemDownOverride,forcedStemEndY),dotY=Math.abs(step%2)===1?y:y-5;if(accidental)g.appendChild(textEl('♯',{x:x-20,y:y+7,'font-size':21,'font-family':'serif','font-weight':700}));g.appendChild(el('ellipse',{cx:x,cy:y,rx:NOTE_RX,ry:NOTE_RY,transform:`rotate(-18 ${x} ${y})`,fill:isOpen?'transparent':'currentColor',stroke:'currentColor','stroke-width':'1.8'}));if(hasStem)g.appendChild(el('line',{x1:stem.stemX,x2:stem.stemX,y1:y,y2:stem.stemEndY,stroke:'currentColor','stroke-width':'1.6'}));if(rhythm==='dotted-crotchet')g.appendChild(el('circle',{cx:x+15,cy:dotY,r:2.2,fill:'currentColor'}));if(rhythm==='quaver'&&showFlag){const d=stem.stemDown?`M ${stem.stemX} ${stem.stemEndY} C ${stem.stemX+14} ${stem.stemEndY-6}, ${stem.stemX+13} ${stem.stemEndY-16}, ${stem.stemX+3} ${stem.stemEndY-20}`:`M ${stem.stemX} ${stem.stemEndY} C ${stem.stemX+14} ${stem.stemEndY+6}, ${stem.stemX+13} ${stem.stemEndY+16}, ${stem.stemX+3} ${stem.stemEndY+20}`;g.appendChild(el('path',{d,fill:'none',stroke:'currentColor','stroke-width':'1.8','stroke-linecap':'round'}))}}
function drawBeam(g,start,end){if(!start||!end)return;g.appendChild(el('line',{x1:start.x,y1:start.y,x2:end.x,y2:end.y,stroke:'currentColor','stroke-width':4,'stroke-linecap':'butt'}))}
function drawKeySignature(g,signature,xOffset=0,yOffset=0,scale=1){if(signature==='sharp')g.appendChild(textEl('♯',{x:KEY_SIG_X+2+xOffset,y:yForStep(8)+8+yOffset,'font-size':28*scale,'font-family':'serif','font-weight':900}));if(signature==='flat')g.appendChild(textEl('♭',{x:KEY_SIG_X-6+xOffset,y:yForStep(4)+6+yOffset,'font-size':27*scale,'font-family':'serif','font-weight':900}))}
function drawTimeSignature(g){const wrap=el('g',{'font-family':'serif','font-weight':900,'font-size':36,'text-anchor':'middle'});wrap.appendChild(textEl('4',{x:TIME_SIG_X,y:TREBLE_TOP+24}));wrap.appendChild(textEl('4',{x:TIME_SIG_X,y:TREBLE_TOP+44}));g.appendChild(wrap)}
function drawPassage(g,bars){const barWidth=(STAFF_RIGHT-MUSIC_START_X)/BAR_COUNT;bars.forEach((bar,barIndex)=>{const startX=MUSIC_START_X+barIndex*barWidth+5,endX=MUSIC_START_X+(barIndex+1)*barWidth-5,positions=getBarPositions(bar,startX,endX);let accShown=false;bar.forEach((note,noteIndex)=>{const x=positions[noteIndex],step=stepForNote(note.pitch),y=yForStep(step),group=getQuaverGroupBounds(bar,noteIndex),beamed=!!group,groupStemDown=group?getBeamedGroupStemDown(bar,group):null;let beamStart=null,beamEnd=null,forcedStemEndY=null;if(group){const ends=getBeamEnds(bar,group,positions,groupStemDown),currentStem=getStemData(x,y,step,groupStemDown);beamStart=ends.start;beamEnd=ends.end;forcedStemEndY=getBeamLineYAtX(currentStem.stemX,beamStart,beamEnd)}const showAcc=note.pitch.includes('#')&&!accShown;if(note.pitch.includes('#'))accShown=true;drawLedgerLines(g,x,step);drawRhythmNote(g,{x,y,step,rhythm:note.rhythm,accidental:showAcc,showFlag:!beamed,forcedStemEndY,stemDownOverride:groupStemDown});if(note.rhythm==='quaver'&&group?.start===noteIndex&&group.end>noteIndex)drawBeam(g,beamStart,beamEnd)})})}
function drawPractice(g){const centerX=VIEWBOX_WIDTH/2,staffWidth=360,staffLeft=centerX-staffWidth/2,staffRight=centerX+staffWidth/2,practiceNoteX=centerX+70,g4Step=stepForNote('G4');drawStaffLines(g,staffLeft,staffRight,TREBLE_TOP,LINE_GAP*2);g.appendChild(textEl(TREBLE_CLEF,{x:centerX-150,y:TREBLE_TOP+66,'font-size':180,'font-family':'serif','dominant-baseline':'middle'}));drawKeySignature(g,question.key.signature,centerX-70-KEY_SIG_X,0,2);if(question.key.id==='a-minor'){const group=el('g',{transform:`translate(${practiceNoteX}, 0) scale(2) translate(${-practiceNoteX}, 0)`});drawLedgerLines(group,practiceNoteX,g4Step);drawRhythmNote(group,{x:practiceNoteX,y:yForStep(g4Step)-60,step:g4Step,rhythm:'crotchet',accidental:true,showFlag:false});g.appendChild(group)}}
function renderNotation(){notation.innerHTML='';if(mode==='practice'){drawPractice(notation);return}drawStaffLines(notation);drawBarLines(notation);notation.appendChild(textEl(TREBLE_CLEF,{x:CLEF_X,y:TREBLE_TOP+33,'font-size':90,'font-family':'serif','dominant-baseline':'middle'}));drawKeySignature(notation,question.key.signature);drawTimeSignature(notation);drawPassage(notation,question.bars)}
function helpTextHtml(keyId){if(keyId==='c-major')return 'I <span style="font-weight:700;text-decoration:underline;">C</span> nothing.';if(keyId==='a-minor')return 'It sounds dark, angry or sad.';if(keyId==='f-major')return 'The key signature has a <span style="font-weight:700;text-decoration:underline;">f</span>lat.';if(keyId==='g-major')return 'The key signature has a hashta<span style="font-weight:700;text-decoration:underline;">G</span>';return ''}
function renderAnswers(){answers.innerHTML='';KEYS.forEach(k=>{const b=document.createElement('button');b.type='button';b.textContent=k.label;b.disabled=!!feedback;b.className=`rounded-xl border px-4 py-3 font-semibold ${selectedAnswer===k.id?'bg-stone-950 text-white border-stone-950':'border-stone-300 hover:bg-stone-100'}`;b.onclick=()=>selectAnswer(k.id);answers.appendChild(b)})}
function renderHelp(){helpBtn.className=`h-10 w-10 rounded-full border text-lg font-bold ${showHelp?'bg-stone-950 text-white border-stone-950':'bg-white text-stone-950 border-stone-300 hover:bg-stone-100'}`;helpBox.classList.toggle('hidden',!showHelp);helpBox.innerHTML=showHelp?helpTextHtml(question.key.id):''}
function renderStats(){$('score').textContent=`${correct}/${attempted}`;$('accuracy').textContent=`${attempted?Math.round(correct/attempted*100):0}%`;$('streak').textContent=streak;$('bestStreak').textContent=`Best streak: ${bestStreak}`}
function renderFeedback(){const f=$('feedback');f.className='mt-5 min-h-[54px] rounded-xl border border-stone-200 bg-stone-50 p-4';if(!feedback){f.classList.add('text-stone-700');f.textContent='Choose the correct key.';return}f.classList.add(feedback==='correct'?'text-green-700':'text-red-700','font-semibold');f.textContent=feedback==='correct'?`${TICK} Correct`:`${CROSS} Incorrect`}
function renderModeButtons(){practiceBtn.className=`rounded-xl border px-4 py-2 text-sm font-semibold ${mode==='practice'?'bg-stone-950 text-white border-stone-950':'bg-white border-stone-300 hover:bg-stone-100'}`;examBtn.className=`rounded-xl border px-4 py-2 text-sm font-semibold ${mode==='exam'?'bg-stone-950 text-white border-stone-950':'bg-white border-stone-300 hover:bg-stone-100'}`}
function render(){renderModeButtons();renderStats();renderAnswers();renderHelp();renderNotation();renderFeedback()}
function clearTimer(){if(timer){clearTimeout(timer);timer=null}}
function nextQuestion(){clearTimer();question=makeQuestion();selectedAnswer=null;feedback=null;showHelp=false;render()}
function selectAnswer(answerId){if(feedback)return;const ok=answerId===question.key.id;selectedAnswer=answerId;attempted++;if(ok){correct++;streak++;bestStreak=Math.max(bestStreak,streak);feedback='correct'}else{streak=0;feedback='incorrect'}showHelp=false;render();timer=setTimeout(nextQuestion,2000)}
function resetScore(){correct=0;attempted=0;streak=0;bestStreak=0;nextQuestion()}
function changeMode(nextMode){clearTimer();mode=nextMode;question=makeQuestion();selectedAnswer=null;feedback=null;showHelp=false;render()}
practiceBtn.onclick=()=>changeMode('practice');examBtn.onclick=()=>changeMode('exam');resetBtn.onclick=resetScore;helpBtn.onclick=()=>{if(feedback)return;showHelp=!showHelp;render()};
console.assert(KEYS.length===4,'There should be four answer choices.');
console.assert(BAR_COUNT===3,'Exercise should use three bars.');
console.assert(FINAL_BAR_PATTERNS.some(p=>p.length===1&&p[0]==='semibreve'),'Final bar can contain a semibreve.');
render();
</script>
</body>
</html>
