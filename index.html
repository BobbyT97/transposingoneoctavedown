<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transposing</title>
<style>
:root{--stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-300:#d6d3d1;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;--stone-800:#292524;--stone-950:#0c0a09;--green:#15803d;--red:#b91c1c}
*{box-sizing:border-box}
body{margin:0;background:var(--stone-50);color:var(--stone-950);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px}
.container{max-width:1100px;margin:0 auto}
.card{background:#fff;border:1px solid var(--stone-200);border-radius:18px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
header{padding:24px;margin-bottom:20px}
.header-row{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
h1{margin:0;font-size:clamp(1.6rem,3vw,2.2rem);line-height:1.1}
.subtitle{margin:10px 0 0;color:var(--stone-700)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;min-width:280px}
.stat{background:var(--stone-50);border:1px solid var(--stone-200);border-radius:14px;padding:12px;text-align:center}
.stat-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--stone-500);margin-bottom:3px}
.stat-value{font-size:1.35rem;font-weight:700}
main{padding:22px}
.top-row{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:14px}
button{appearance:none;border:1px solid var(--stone-300);background:#fff;color:var(--stone-950);border-radius:14px;padding:12px 18px;font-weight:700;cursor:pointer;font-size:.95rem}
button:hover:not(:disabled){background:var(--stone-100)}
button:disabled{opacity:.4;cursor:not-allowed}
.active,.primary{background:var(--stone-950);color:#fff;border-color:var(--stone-950)}
.svg-wrap{position:relative;border:1px solid var(--stone-200);border-radius:14px;overflow:hidden;background:#fff}
svg{display:block;width:100%;height:auto;user-select:none;touch-action:none}
.nudge-controls{position:absolute;right:16px;top:58%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px}
.nudge-controls button{background:#fff;padding:12px 16px;font-size:1.1rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.rhythm-panel{margin-bottom:16px;border:1px solid var(--stone-200);background:var(--stone-50);border-radius:14px;padding:12px}
.rhythm-title{margin-bottom:8px;font-size:.9rem;font-weight:700;color:var(--stone-700)}
.rhythm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rhythm-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff}
.rhythm-btn svg{width:40px;height:48px}
.feedback-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:18px}
.feedback-box{min-height:58px;border:1px solid var(--stone-200);background:var(--stone-50);border-radius:14px;padding:16px;color:var(--stone-700);display:flex;align-items:center}
.feedback-correct{color:var(--green);font-weight:800;font-size:1.15rem}
.feedback-incorrect,.feedback-error{color:var(--red);font-weight:800;font-size:1.15rem}
.actions{display:flex;gap:8px;justify-content:flex-end}
.footer-note{margin-top:14px;color:var(--stone-600);font-size:.88rem}
@media(max-width:720px){body{padding:12px}header,main{padding:16px}.stats{width:100%;min-width:0}.rhythm-grid{grid-template-columns:repeat(2,1fr)}.feedback-row{grid-template-columns:1fr}.actions{justify-content:stretch}.actions button{flex:1}}
</style>
</head>
<body>
<div class="container">
<header class="card">
  <div class="header-row">
    <div>
      <h1>Transposing</h1>
      <p class="subtitle">Transpose the following note one octave lower into the bass clef.</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0/0</div></div>
      <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value" id="accuracy">0%</div></div>
      <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streak">0</div></div>
    </div>
  </div>
</header>

<main class="card">
  <div class="top-row">
    <button id="notesBtn" class="active">Notes Only</button>
    <button id="rhythmBtn">Notes and Rhythms</button>
    <button id="examBtn">Exam Style</button>
    <button id="resetBtn">Reset score</button>
  </div>

  <div id="rhythmPanel" class="rhythm-panel" style="display:none">
    <div class="rhythm-title" id="rhythmTitle">Choose a rhythm first:</div>
    <div class="rhythm-grid" id="rhythmGrid"></div>
  </div>

  <div class="svg-wrap">
    <svg id="musicSvg" viewBox="0 0 720 380" aria-label="Grand staff transposition quiz">
      <rect x="0" y="0" width="720" height="380" fill="white"></rect>
      <g id="trebleStaff"></g><g id="bassStaff"></g>
      <text id="trebleClef" x="116" y="119" font-size="118" font-family="serif" dominant-baseline="middle"></text>
      <text id="bassClef" x="112" y="260" font-size="81" font-family="serif" dominant-baseline="middle"></text>
      <g id="questionLayer"></g><g id="answerLayer"></g>
      <rect id="hitbox" fill="transparent"></rect>
    </svg>
    <div class="nudge-controls">
      <button id="upBtn" aria-label="Move note up">↑</button>
      <button id="downBtn" aria-label="Move note down">↓</button>
    </div>
  </div>

  <div class="feedback-row">
    <div class="feedback-box" id="feedbackBox">Hover over the bass clef stave, then click or tap to lock in your note.</div>
    <div class="actions">
      <button id="undoBtn" style="display:none">Undo</button>
      <button id="unlockBtn" disabled>Unlock</button>
      <button id="confirmBtn" class="primary" disabled>Confirm</button>
      <button id="nextBtn" class="primary" style="display:none">Next</button>
    </div>
  </div>
  <div class="footer-note" id="footerNote">Best streak: 0</div>
</main>
</div>

<script>
const STAFF_LEFT=96,STAFF_RIGHT=520,LINE_GAP=14,TREBLE_TOP=78,BASS_TOP=226,NOTE_RX=10,NOTE_RY=7,SINGLE_X=245,PASSAGE_START_X=185,PASSAGE_END_X=STAFF_RIGHT-35;
const TREBLE_CLEF=String.fromCodePoint(0x1d11e),BASS_CLEF=String.fromCodePoint(0x1d122),TICK=String.fromCodePoint(0x2714),CROSS=String.fromCodePoint(0x2716),GREEN="#15803d",RED="#b91c1c";

const trebleNotes=[{letter:"C",octave:4,step:-2},{letter:"D",octave:4,step:-1},{letter:"E",octave:4,step:0},{letter:"F",octave:4,step:1},{letter:"G",octave:4,step:2},{letter:"A",octave:4,step:3},{letter:"B",octave:4,step:4},{letter:"C",octave:5,step:5}];
const bassAnswerNotes=[{letter:"C",octave:3,step:3},{letter:"D",octave:3,step:4},{letter:"E",octave:3,step:5},{letter:"F",octave:3,step:6},{letter:"G",octave:3,step:7},{letter:"A",octave:3,step:8},{letter:"B",octave:3,step:9},{letter:"C",octave:4,step:10}];

const rhythms=[{id:"semibreve",label:"Semibreve"},{id:"minim",label:"Minim"},{id:"crotchet",label:"Crotchet"},{id:"quaver",label:"Quaver"}];
const examRhythms=[{id:"minim",label:"Minim"},{id:"dotted-crotchet",label:"Dotted crotchet"},{id:"crotchet",label:"Crotchet"},{id:"quaver",label:"Quaver"}];
const examRhythmPatterns=[
  {rhythms:["minim","crotchet","crotchet"],stepwiseOnly:false},
  {rhythms:["dotted-crotchet","quaver","crotchet","crotchet"],stepwiseOnly:false},
  {rhythms:["crotchet","crotchet","dotted-crotchet","quaver"],stepwiseOnly:false},
  {rhythms:["crotchet","crotchet","crotchet","crotchet"],stepwiseOnly:false},
  {rhythms:["dotted-crotchet","quaver","dotted-crotchet","quaver"],stepwiseOnly:false},
  {rhythms:["crotchet","crotchet","minim"],stepwiseOnly:false},
  {rhythms:["minim","minim"],stepwiseOnly:false},
  {rhythms:["dotted-crotchet","quaver","minim"],stepwiseOnly:false},
  {rhythms:["crotchet","quaver","quaver","crotchet","crotchet"],stepwiseOnly:true},
  {rhythms:["quaver","quaver","quaver","quaver","minim"],stepwiseOnly:true},
  {rhythms:["crotchet","quaver","quaver","quaver","quaver","crotchet"],stepwiseOnly:true},
  {rhythms:["minim","quaver","quaver","quaver","quaver"],stepwiseOnly:true}
];

let mode="notes",questionIndex=randomQuestion(),rhythmIndex=randomRhythm(),selectedRhythm=null,passage=makePassage(),examRhythmsSelected=[],examSteps=[],activeExamSlot=0,hoverStep=null,lockedStep=null,feedback=null,feedbackDetail=null,examFeedback=null,rhythmError="",correct=0,attempted=0,streak=0,bestStreak=0,timer=null;

const svg=document.getElementById("musicSvg"),trebleStaff=document.getElementById("trebleStaff"),bassStaff=document.getElementById("bassStaff"),questionLayer=document.getElementById("questionLayer"),answerLayer=document.getElementById("answerLayer"),hitbox=document.getElementById("hitbox"),scoreEl=document.getElementById("score"),accuracyEl=document.getElementById("accuracy"),streakEl=document.getElementById("streak"),footerNote=document.getElementById("footerNote"),feedbackBox=document.getElementById("feedbackBox"),rhythmPanel=document.getElementById("rhythmPanel"),rhythmTitle=document.getElementById("rhythmTitle"),rhythmGrid=document.getElementById("rhythmGrid"),notesBtn=document.getElementById("notesBtn"),rhythmBtn=document.getElementById("rhythmBtn"),examBtn=document.getElementById("examBtn"),resetBtn=document.getElementById("resetBtn"),upBtn=document.getElementById("upBtn"),downBtn=document.getElementById("downBtn"),undoBtn=document.getElementById("undoBtn"),unlockBtn=document.getElementById("unlockBtn"),confirmBtn=document.getElementById("confirmBtn"),nextBtn=document.getElementById("nextBtn");
document.getElementById("trebleClef").textContent=TREBLE_CLEF;
document.getElementById("bassClef").textContent=BASS_CLEF;

function svgEl(n,a={}){const e=document.createElementNS("http://www.w3.org/2000/svg",n);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e}
function yForStep(top,step){return top+LINE_GAP*4-step*(LINE_GAP/2)}
function stepFromPointerY(y,top){return Math.round((top+LINE_GAP*4-y)/(LINE_GAP/2))}
function clampStep(s){return Math.max(3,Math.min(10,s))}
function stemGoesDown(step){return step>4}
function rhythmSpaceValue(r){return({minim:2,"dotted-crotchet":1.5,crotchet:1,quaver:.5}[r]??1)}
function randomIndex(l,p=null){let n=Math.floor(Math.random()*l);if(l>1)while(n===p)n=Math.floor(Math.random()*l);return n}
function randomQuestion(p=null){return randomIndex(trebleNotes.length,p)}
function randomRhythm(p=null){return randomIndex(rhythms.length,p)}
function makePassage(){const pat=examRhythmPatterns[randomIndex(examRhythmPatterns.length)];if(!pat.stepwiseOnly)return pat.rhythms.map(r=>({noteIndex:randomIndex(trebleNotes.length),rhythm:r}));let current=randomIndex(trebleNotes.length),idx=[current];for(let i=1;i<pat.rhythms.length;i++){const moves=[];if(current>0)moves.push(-1);if(current<trebleNotes.length-1)moves.push(1);current+=moves[randomIndex(moves.length)];idx.push(current)}return pat.rhythms.map((r,i)=>({noteIndex:idx[i],rhythm:r}))}
function getPassagePositions(p){const total=p.reduce((t,i)=>t+rhythmSpaceValue(i.rhythm),0),unit=(PASSAGE_END_X-PASSAGE_START_X)/Math.max(total,1);let cursor=PASSAGE_START_X;return p.map(i=>{const w=rhythmSpaceValue(i.rhythm)*unit,x=cursor+w/2;cursor+=w;return x})}

function drawStaff(g,top){g.innerHTML="";for(let i=0;i<5;i++)g.appendChild(svgEl("line",{x1:STAFF_LEFT,x2:STAFF_RIGHT,y1:top+i*LINE_GAP,y2:top+i*LINE_GAP,stroke:"currentColor","stroke-width":"1.5"}));g.appendChild(svgEl("line",{x1:STAFF_RIGHT,x2:STAFF_RIGHT,y1:top,y2:top+LINE_GAP*4,stroke:"currentColor","stroke-width":"1.5"}))}
function ledger(parent,x,step,clef,colour="currentColor"){const ys=[];if(clef==="treble"&&step<=-2)ys.push(yForStep(TREBLE_TOP,-2));if(clef==="bass"&&step>=10)ys.push(yForStep(BASS_TOP,10));ys.forEach(y=>parent.appendChild(svgEl("line",{x1:x-19,x2:x+19,y1:y,y2:y,stroke:colour,"stroke-width":"1.5","pointer-events":"none"})))}
function stemData(x,y,step,downOverride=null,forcedY=null){const down=downOverride??stemGoesDown(step),stemX=down?x-NOTE_RX+1:x+NOTE_RX-1,natural=down?y+48:y-48;return{down,stemX,stemEndY:forcedY??natural}}
function beamYAtX(x,a,b){if(!a||!b||a.x===b.x)return a?.y??b?.y??null;const p=(x-a.x)/(b.x-a.x);return a.y+p*(b.y-a.y)}
function rhythmNote(parent,{x,y,step,rhythm="crotchet",colour="currentColor",opacity=1,preview=false,showFlag=true,downOverride=null,forcedStemEndY=null}){const open=rhythm==="semibreve"||rhythm==="minim",hasStem=["minim","crotchet","dotted-crotchet","quaver"].includes(rhythm),sd=stemData(x,y,step,downOverride,forcedStemEndY);const g=svgEl("g",{opacity,"pointer-events":"none"});g.appendChild(svgEl("ellipse",{cx:x,cy:y,rx:NOTE_RX,ry:NOTE_RY,transform:`rotate(-18 ${x} ${y})`,fill:open?"transparent":colour,stroke:colour,"stroke-width":preview?"2":"2.2"}));if(hasStem)g.appendChild(svgEl("line",{x1:sd.stemX,x2:sd.stemX,y1:y,y2:sd.stemEndY,stroke:colour,"stroke-width":"2"}));if(rhythm==="dotted-crotchet")g.appendChild(svgEl("circle",{cx:x+18,cy:y-2,r:"2.4",fill:colour}));if(rhythm==="quaver"&&showFlag){const d=sd.down?`M ${sd.stemX} ${sd.stemEndY} C ${sd.stemX+22} ${sd.stemEndY-8}, ${sd.stemX+21} ${sd.stemEndY-24}, ${sd.stemX+4} ${sd.stemEndY-31}`:`M ${sd.stemX} ${sd.stemEndY} C ${sd.stemX+22} ${sd.stemEndY+8}, ${sd.stemX+21} ${sd.stemEndY+24}, ${sd.stemX+4} ${sd.stemEndY+31}`;g.appendChild(svgEl("path",{d,fill:"none",stroke:colour,"stroke-width":"2.2","stroke-linecap":"round"}))}parent.appendChild(g)}
function beam(parent,a,b,colour="currentColor"){if(!a||!b)return;parent.appendChild(svgEl("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:colour,"stroke-width":"5","stroke-linecap":"butt","pointer-events":"none"}))}
function placedQuaver(i){return i?.rhythm==="quaver"&&i.step!=null}
function quaverGroup(items,index){if(!placedQuaver(items[index]))return null;let s=index,e=index;while(s>0&&placedQuaver(items[s-1]))s--;while(e<items.length-1&&placedQuaver(items[e+1]))e++;return e>s?{start:s,end:e}:null}
function pointerToSvg(evt){const p=svg.createSVGPoint();p.x=evt.clientX;p.y=evt.clientY;return p.matrixTransform(svg.getScreenCTM().inverse())}

function buildExamAnswerSource(){return passage.map((it,i)=>{const isHover=i===activeExamSlot&&examSteps[i]==null&&hoverStep!=null&&examRhythmsSelected[i]!=null;return{noteIndex:it.noteIndex,rhythm:examRhythmsSelected[i],step:isHover?hoverStep:examSteps[i],isHover}})}
function normalise(source,correctAnswer,clef){return source.map((it,i)=>{if(!it)return null;const rhythm=correctAnswer?passage[i]?.rhythm:it.rhythm;const step=correctAnswer?bassAnswerNotes[passage[i].noteIndex].step:(it.step??(clef==="treble"?trebleNotes[it.noteIndex].step:undefined));return{...it,rhythm,step}})}
function drawPassage(parent,top,clef,source,resultDetails=null,correctAnswer=false,xOffset=0,wrongOnly=false){const positions=getPassagePositions(passage),items=normalise(source,correctAnswer,clef);items.forEach((it,i)=>{if(!it)return;if(wrongOnly&&resultDetails?.[i]?.pitchCorrect&&resultDetails?.[i]?.rhythmCorrect)return;if(!correctAnswer&&clef==="bass"&&(it.step==null||it.rhythm==null))return;const x=(positions[i]??PASSAGE_START_X)+xOffset,y=yForStep(top,it.step),res=resultDetails?.[i];let colour="currentColor";if(correctAnswer){if(res&&(!res.pitchCorrect||!res.rhythmCorrect))colour=GREEN;else return}else if(res){colour=(res.pitchCorrect&&res.rhythmCorrect)?GREEN:RED}const group=quaverGroup(items,i),beamed=Boolean(group);let groupDown=null,beamStart=null,beamEnd=null,forcedY=null;if(group){groupDown=stemGoesDown(items[group.start].step);const sx=positions[group.start]??PASSAGE_START_X,sy=yForStep(top,items[group.start].step),ex=positions[group.end]??PASSAGE_START_X,ey=yForStep(top,items[group.end].step);const sd1=stemData(sx,sy,items[group.start].step,groupDown),sd2=stemData(ex,ey,items[group.end].step,groupDown);beamStart={x:sd1.stemX+xOffset,y:sd1.stemEndY};beamEnd={x:sd2.stemX+xOffset,y:sd2.stemEndY};forcedY=beamYAtX(stemData(x,y,it.step,groupDown).stemX,beamStart,beamEnd)}ledger(parent,x,it.step,clef,colour);rhythmNote(parent,{x,y,step:it.step,rhythm:it.rhythm,colour,showFlag:!beamed,downOverride:groupDown,forcedStemEndY:forcedY,opacity:correctAnswer?.9:(it.isHover?.55:1),preview:it.isHover});if(group&&group.start===i)beam(parent,beamStart,beamEnd,colour)})}

function drawSingle(){const q=trebleNotes[questionIndex],ans=bassAnswerNotes[questionIndex],rh=rhythms[rhythmIndex];const g=svgEl("g",{transform:`translate(${SINGLE_X} 0)`});ledger(g,0,q.step,"treble");rhythmNote(g,{x:0,y:yForStep(TREBLE_TOP,q.step),step:q.step,rhythm:mode==="rhythm"?rh.id:"crotchet"});questionLayer.appendChild(g);const active=lockedStep??hoverStep;if(active!=null&&feedback!=="incorrect"){const a=svgEl("g",{transform:`translate(${SINGLE_X} 0)`});ledger(a,0,active,"bass");rhythmNote(a,{x:0,y:yForStep(BASS_TOP,active),step:active,rhythm:mode==="rhythm"?(selectedRhythm||"crotchet"):"crotchet",opacity:lockedStep==null?.55:1,preview:lockedStep==null});answerLayer.appendChild(a)}if(feedback==="incorrect"&&lockedStep!=null&&feedbackDetail){const wrong=svgEl("g",{transform:`translate(${SINGLE_X} 0)`}),wc=feedbackDetail.pitchCorrect?GREEN:RED;ledger(wrong,0,lockedStep,"bass",wc);rhythmNote(wrong,{x:0,y:yForStep(BASS_TOP,lockedStep),step:lockedStep,rhythm:mode==="rhythm"?selectedRhythm:"crotchet",colour:wc});answerLayer.appendChild(wrong);if(!feedbackDetail.pitchCorrect||!feedbackDetail.rhythmCorrect){const corr=svgEl("g",{transform:`translate(${SINGLE_X+70} 0)`});ledger(corr,0,ans.step,"bass",GREEN);rhythmNote(corr,{x:0,y:yForStep(BASS_TOP,ans.step),step:ans.step,rhythm:mode==="rhythm"?rh.id:"crotchet",colour:GREEN});answerLayer.appendChild(corr)}}if(feedback==="correct"&&lockedStep!=null){const ok=svgEl("g",{transform:`translate(${SINGLE_X} 0)`});ledger(ok,0,lockedStep,"bass",GREEN);rhythmNote(ok,{x:0,y:yForStep(BASS_TOP,lockedStep),step:lockedStep,rhythm:mode==="rhythm"?selectedRhythm:"crotchet",colour:GREEN});answerLayer.appendChild(ok)}}

function render(){questionLayer.innerHTML="";answerLayer.innerHTML="";scoreEl.textContent=`${correct}/${attempted}`;accuracyEl.textContent=`${attempted?Math.round(correct/attempted*100):0}%`;streakEl.textContent=streak;footerNote.textContent=`Best streak: ${bestStreak}`;notesBtn.classList.toggle("active",mode==="notes");rhythmBtn.classList.toggle("active",mode==="rhythm");examBtn.classList.toggle("active",mode==="exam");rhythmPanel.style.display=(mode==="rhythm"||mode==="exam")&&!feedback?"block":"none";rhythmTitle.textContent=mode==="exam"?`Choose a rhythm for note ${activeExamSlot+1}:`:"Choose a rhythm first:";drawRhythmButtons();if(mode==="exam"){drawPassage(questionLayer,TREBLE_TOP,"treble",passage);drawPassage(answerLayer,BASS_TOP,"bass",buildExamAnswerSource(),examFeedback);if(feedback==="incorrect")drawPassage(answerLayer,BASS_TOP,"bass",passage,examFeedback,true,24,true)}else drawSingle();const pos=getPassagePositions(passage);hitbox.setAttribute("x",mode==="exam"?(pos[activeExamSlot]??PASSAGE_START_X)-28:SINGLE_X-52);hitbox.setAttribute("y",BASS_TOP-28);hitbox.setAttribute("width",mode==="exam"?56:104);hitbox.setAttribute("height",LINE_GAP*4+98);updateFeedback()}
function drawRhythmButtons(){rhythmGrid.innerHTML="";const list=mode==="exam"?examRhythms:rhythms;list.forEach(r=>{const b=document.createElement("button");b.type="button";b.className="rhythm-btn "+((mode==="exam"?examRhythmsSelected[activeExamSlot]===r.id:selectedRhythm===r.id)?"active":"");const icon=document.createElementNS("http://www.w3.org/2000/svg","svg");icon.setAttribute("viewBox","0 0 56 72");rhythmNote(icon,{x:20,y:48,step:4,rhythm:r.id});b.appendChild(icon);const s=document.createElement("span");s.textContent=r.label;b.appendChild(s);b.onclick=()=>selectRhythm(r.id);rhythmGrid.appendChild(b)})}
function updateFeedback(){const examReady=mode==="exam"&&passage.every((_,i)=>examSteps[i]!=null&&examRhythmsSelected[i]!=null),canConfirm=mode==="notes"?lockedStep!=null&&!feedback:mode==="rhythm"?lockedStep!=null&&selectedRhythm&&!feedback:examReady&&!feedback;unlockBtn.disabled=feedback||(mode==="exam"?examSteps[activeExamSlot]==null:lockedStep==null);undoBtn.style.display=mode==="exam"&&!feedback?"inline-block":"none";undoBtn.disabled=activeExamSlot===0&&examSteps[0]==null&&examRhythmsSelected[0]==null;confirmBtn.style.display=mode==="exam"&&feedback?"none":"inline-block";unlockBtn.style.display=mode==="exam"&&feedback?"none":"inline-block";nextBtn.style.display=mode==="exam"&&feedback?"inline-block":"none";confirmBtn.disabled=!canConfirm;if(rhythmError&&!feedback){feedbackBox.className="feedback-box feedback-error";feedbackBox.textContent=rhythmError;return}feedbackBox.className="feedback-box";if(!feedback&&mode==="exam"){feedbackBox.textContent=examReady?"Click confirm to check your answer.":`Complete note ${activeExamSlot+1} of ${passage.length}. Choose its rhythm first, then place the pitch.`;return}if(!feedback&&mode==="rhythm"&&lockedStep==null&&selectedRhythm==null){feedbackBox.textContent="Choose a rhythm first.";return}if(!feedback&&lockedStep==null){feedbackBox.textContent="Hover over the bass clef stave, then click or tap to lock in your note.";return}if(!feedback){feedbackBox.textContent="Click confirm to check your answer.";return}feedbackBox.className="feedback-box "+(feedback==="correct"?"feedback-correct":"feedback-incorrect");feedbackBox.textContent=feedback==="correct"?`${TICK} Correct`:`${CROSS} Incorrect`}

function selectRhythm(id){if(feedback)return;if(mode==="exam"){examRhythmsSelected[activeExamSlot]=id}else selectedRhythm=id;rhythmError="";render()}
function blockPitch(){if(mode==="rhythm"&&!selectedRhythm){rhythmError="Choose a rhythm first.";return true}if(mode==="exam"&&!examRhythmsSelected[activeExamSlot]){rhythmError=`Choose a rhythm for note ${activeExamSlot+1} first.`;return true}return false}
function placeStep(step){if(mode==="exam"){const currentRhythm=examRhythmsSelected[activeExamSlot],nextSlot=Math.min(activeExamSlot+1,passage.length-1);examSteps[activeExamSlot]=step;if(nextSlot!==activeExamSlot&&examRhythmsSelected[nextSlot]==null)examRhythmsSelected[nextSlot]=currentRhythm;activeExamSlot=nextSlot;hoverStep=null}else{lockedStep=step;hoverStep=step}rhythmError="";render()}
hitbox.addEventListener("pointermove",e=>{if(feedback)return;if(mode!=="exam"&&lockedStep!=null)return;if(mode==="rhythm"&&!selectedRhythm)return;if(mode==="exam"&&!examRhythmsSelected[activeExamSlot])return;hoverStep=clampStep(stepFromPointerY(pointerToSvg(e).y,BASS_TOP));render()});
hitbox.addEventListener("pointerdown",e=>{if(feedback||blockPitch()){render();return}placeStep(clampStep(stepFromPointerY(pointerToSvg(e).y,BASS_TOP)))});
function nudge(d){if(feedback||blockPitch()){render();return}const base=mode==="exam"?(examSteps[activeExamSlot]??hoverStep??bassAnswerNotes[passage[activeExamSlot].noteIndex].step):(lockedStep??hoverStep??bassAnswerNotes[questionIndex].step);placeStep(clampStep(base+d))}
function confirmAnswer(){if(mode==="exam"){const ready=passage.every((_,i)=>examSteps[i]!=null&&examRhythmsSelected[i]!=null);if(!ready)return;examFeedback=passage.map((it,i)=>({pitchCorrect:examSteps[i]===bassAnswerNotes[it.noteIndex].step,rhythmCorrect:examRhythmsSelected[i]===it.rhythm}));const ok=examFeedback.every(x=>x.pitchCorrect&&x.rhythmCorrect);attempted++;if(ok)correct++;streak=ok?streak+1:0;bestStreak=Math.max(bestStreak,streak);feedback=ok?"correct":"incorrect";render();return}if(mode==="rhythm"&&!selectedRhythm)return;if(lockedStep==null)return;const pc=lockedStep===bassAnswerNotes[questionIndex].step,rc=mode==="rhythm"?selectedRhythm===rhythms[rhythmIndex].id:true,ok=pc&&rc;attempted++;if(ok)correct++;streak=ok?streak+1:0;bestStreak=Math.max(bestStreak,streak);feedback=ok?"correct":"incorrect";feedbackDetail={pitchCorrect:pc,rhythmCorrect:rc};render();timer=setTimeout(nextQuestion,ok?2000:4000)}
function nextQuestion(){clearTimeout(timer);questionIndex=randomQuestion(questionIndex);rhythmIndex=randomRhythm(rhythmIndex);selectedRhythm=null;passage=makePassage();examRhythmsSelected=[];examSteps=[];activeExamSlot=0;hoverStep=null;lockedStep=null;feedback=null;feedbackDetail=null;examFeedback=null;rhythmError="";render()}
function changeMode(m){clearTimeout(timer);mode=m;correct=0;attempted=0;streak=0;bestStreak=0;nextQuestion()}
function resetScore(){correct=0;attempted=0;streak=0;bestStreak=0;nextQuestion()}
function undoExam(){if(mode!=="exam"||feedback)return;const t=examSteps[activeExamSlot]==null&&examRhythmsSelected[activeExamSlot]==null?Math.max(activeExamSlot-1,0):activeExamSlot;examSteps[t]=null;examRhythmsSelected[t]=null;activeExamSlot=t;hoverStep=null;rhythmError="";render()}
notesBtn.onclick=()=>changeMode("notes");rhythmBtn.onclick=()=>changeMode("rhythm");examBtn.onclick=()=>changeMode("exam");resetBtn.onclick=resetScore;upBtn.onclick=()=>nudge(1);downBtn.onclick=()=>nudge(-1);confirmBtn.onclick=confirmAnswer;nextBtn.onclick=nextQuestion;undoBtn.onclick=undoExam;unlockBtn.onclick=()=>{if(feedback)return;if(mode==="exam")examSteps[activeExamSlot]=null;else lockedStep=null;render()};
drawStaff(trebleStaff,TREBLE_TOP);drawStaff(bassStaff,BASS_TOP);render();
</script>
</body>
