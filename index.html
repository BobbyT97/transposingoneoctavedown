<div class="container"><header class="card"><div class="header-row"><div><h1>Transposing</h1><p class="subtitle">Transpose the following notes one octave lower into the bass clef.</p></div><div class="stats"><div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0/0</div></div><div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value" id="accuracy">0%</div></div><div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streak">0</div></div></div></div></header><main class="card"><div class="top-row"><div class="mode-buttons"><button id="practiceBtn" class="active">Practice</button><button id="examBtn">Exam Style Questions</button></div><div class="right-buttons"><button id="helpBtn" class="help" title="Reveal Note Names" aria-label="Reveal Note Names">?</button><button id="resetBtn" class="reset">Reset score</button></div></div><div id="rhythmPanel" class="rhythm-panel" style="display:none"><div class="rhythm-title" id="rhythmTitle">Choose a rhythm for note 1:</div><div class="rhythm-grid" id="rhythmGrid"></div></div><div class="svg-wrap"><svg id="musicSvg" viewBox="0 0 720 380" aria-label="Grand staff transposition quiz"><rect x="0" y="0" width="720" height="380" fill="white"></rect><g id="trebleStaff"></g><g id="bassStaff"></g><text id="trebleClef" x="116" y="119" font-size="130" font-family="serif" dominant-baseline="middle"></text><text id="bassClef" x="112" y="260" font-size="81" font-family="serif" dominant-baseline="middle"></text><g id="helpLayer"></g><g id="questionLayer"></g><g id="answerLayer"></g><rect id="hitbox" fill="transparent"></rect></svg><div class="nudge-controls"><button id="upBtn" aria-label="Move note up">↑</button><button id="downBtn" aria-label="Move note down">↓</button></div></div><div class="feedback-row"><div class="feedback-box" id="feedbackBox">Hover over the bass clef stave, then click or tap to lock in your note.</div><div class="actions"><button id="undoB const STAFF_LEFT=96,STAFF_RIGHT=520,LINE_GAP=14,TREBLE_TOP=78,BASS_TOP=226,NOTE_RX=10,NOTE_RY=7,SINGLE_X=245,PASSAGE_START_X=185,PASSAGE_END_X=STAFF_RIGHT-35;const TREBLE_CLEF=String.fromCodePoint(0x1d11e),BASS_CLEF=String.fromCodePoint(0x1d122),TICK=String.fromCodePoint(0x2714),CROSS=String.fromCodePoint(0x2716),GREEN="#15803d",RED="#b91c1c";const trebleNotes=[{letter:"C",octave:4,step:-2},{letter:"D",octave:4,step:-1},{letter:"E",octave:4,step:0},{letter:"F",octave:4,step:1},{letter:"G",octave:4,step:2},{letter:"A",octave:4,step:3},{letter:"B",octave:4,step:4},{letter:"C",octave:5,step:5}];const bassAnswerNotes=[{letter:"C",octave:3,step:3},{letter:"D",octave:3,step:4},{letter:"E",octave:3,step:5},{letter:"F",octave:3,step:6},{letter:"G",octave:3,step:7},{letter:"A",octave:3,step:8},{letter:"B",octave:3,step:9},{letter:"C",octave:4,step:10}];const examRhythms=[{id:"minim",label:"Minim"},{id:"dotted-crotchet",label:"Dotted crotchet"},{id:"crotchet",label:"Crotchet"},{id:"quaver",label:"Quaver"}];const examRhythmPatterns=[{rhythms:["minim","crotchet","crotchet"],stepwiseOnly:false},{rhythms:["dotted-crotchet","quaver","crotchet","crotchet"],stepwiseOnly:false},{rhythms:["crotchet","crotchet","dotted-crotchet","quaver"],stepwiseOnly:false},{rhythms:["crotchet","crotchet","crotchet","crotchet"],stepwiseOnly:false},{rhythms:["dotted-crotchet","quaver","dotted-crotchet","quaver"],stepwiseOnly:false},{rhythms:["crotchet","crotchet","minim"],stepwiseOnly:false},{rhythms:["minim","minim"],stepwiseOnly:false},{rhythms:["dotted-crotchet","quaver","minim"],stepwiseOnly:false},{rhythms:["crotchet","quaver","quaver","crotchet","crotchet"],stepwiseOnly:true},{rhythms:["quaver","quaver","quaver","quaver","minim"],stepwiseOnly:true},{rhythms:["crotchet","quaver","quaver","quaver","quaver","crotchet"],stepwiseOnly:true},{rhythms:["minim","quaver","quaver","quaver","quaver"],stepwiseOnly:true}];let mode="notes",questionIndex=randomQuestion(),passage=makePassage(),examRhythmsSelected=[],examSteps=[],activeExamSlot=0,hoverStep=null,lockedStep=null,feedback=null,feedbackDetail=null,examFeedback=null,rhythmError="",correct=0,attempted=0,streak=0,bestStreak=0,showHelp=false,timer=null;const svg=document.getElementById("musicSvg"),trebleStaff=document.getElementById("trebleStaff"),bassStaff=document.getElementById("bassStaff"),helpLayer=document.getElementById("helpLayer"),questionLayer=document.getElementById("questionLayer"),answerLayer=document.getElementById("answerLayer"),hitbox=document.getElementById("hitbox"),scoreEl=document.getElementById("score"),accuracyEl=document.getElementById("accuracy"),streakEl=document.getElementById("streak"),footerNote=document.getElementById("footerNote"),feedbackBox=document.getElementById("feedbackBox"),rhythmPanel=document.getElementById("rhythmPanel"),rhythmTitle=document.getElementById("rhythmTitle"),rhythmGrid=document.getElementById("rhythmGrid"),practiceBtn=document.getElementById("practiceBtn"),examBtn=document.getElementById("examBtn"),helpBtn=document.getElementById("helpBtn"),resetBtn=document.getElementById("resetBtn"),upBtn=document.getElementById("upBtn"),downBtn=document.getElementById("downBtn"),undoBtn=document.getElementById("undoBtn"),confirmBtn=document.getElementById("confirmBtn"),nextBtn=document.getElementById("nextBtn");document.getElementById("trebleClef").textContent=TREBLE_CLEF;document.getElementById("bassClef").textContent=BASS_CLEF;
function svgEl(n,a={}){const e=document.createElementNS("http://www.w3.org/2000/svg",n);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e}function yForStep(t,s){return t+LINE_GAP*4-s*(LINE_GAP/2)}function stepFromPointerY(y,t){return Math.round((t+LINE_GAP*4-y)/(LINE_GAP/2))}function clampStep(s){return Math.max(3,Math.min(10,s))}function stemGoesDown(s){return s>4}function rhythmSpaceValue(r){return({minim:2,"dotted-crotchet":1.5,crotchet:1,quaver:.5}[r]??1)}function randomIndex(l,p=null){if(l<=0)return 0;let n=Math.floor(Math.random()*l);if(l>1)while(n===p)n=Math.floor(Math.random()*l);return n}function randomQuestion(p=null){return randomIndex(trebleNotes.length,p)}function makePassage(){const pat=examRhythmPatterns[randomIndex(examRhythmPatterns.length)];if(!pat.stepwiseOnly)return pat.rhythms.map(rhythm=>({noteIndex:randomIndex(trebleNotes.length),rhythm}));const idx=[];let c=randomIndex(trebleNotes.length);idx.push(c);for(let i=1;i<pat.rhythms.length;i++){const moves=[];if(c>0)moves.push(-1);if(c<trebleNotes.length-1)moves.push(1);c+=moves[randomIndex(moves.length)];idx.push(c)}return pat.rhythms.map((rhythm,i)=>({noteIndex:idx[i],rhythm}))}function getPassagePositions(p){const total=p.reduce((t,i)=>t+rhythmSpaceValue(i.rhythm),0),unit=(PASSAGE_END_X-PASSAGE_START_X)/Math.max(total,1);let cursor=PASSAGE_START_X;return p.map(i=>{const w=rhythmSpaceValue(i.rhythm)*unit,x=cursor+w/2;cursor+=w;return x})}function getBeamLineYAtX(x,a,b){if(!a||!b||a.x===b.x)return a?.y??b?.y??null;const p=(x-a.x)/(b.x-a.x);return a.y+p*(b.y-a.y)}function isPlacedQuaver(i){return i?.rhythm==="quaver"&&i.step!=null}function getQuaverGroupBounds(items,index){if(!isPlacedQuaver(items[index]))return null;let s=index,e=index;while(s>0&&isPlacedQuaver(items[s-1]))s--;while(e<items.length-1&&isPlacedQuaver(items[e+1]))e++;return e>s?{start:s,end:e}:null}
function drawStaff(g,top){g.innerHTML="";for(let i=0;i<5;i++)g.appendChild(svgEl("line",{x1:STAFF_LEFT,x2:STAFF_RIGHT,y1:top+i*LINE_GAP,y2:top+i*LINE_GAP,stroke:"currentColor","stroke-width":"1.5"}));g.appendChild(svgEl("line",{x1:STAFF_RIGHT,x2:STAFF_RIGHT,y1:top,y2:top+LINE_GAP*4,stroke:"currentColor","stroke-width":"1.5"}))}function drawHelpLabels(){helpLayer.innerHTML="";if(!showHelp)return;const x=STAFF_LEFT-16,tl=[{step:0,letter:"E"},{step:2,letter:"G"},{step:4,letter:"B"},{step:6,letter:"D"},{step:8,letter:"F"}],ts=[{step:1,letter:"F"},{step:3,letter:"A"},{step:5,letter:"C"},{step:7,letter:"E"}],bl=[{step:0,letter:"G"},{step:2,letter:"B"},{step:4,letter:"D"},{step:6,letter:"F"},{step:8,letter:"A"}],bs=[{step:1,letter:"A"},{step:3,letter:"C"},{step:5,letter:"E"},{step:7,letter:"G"}],root=svgEl("g",{"font-size":"14","font-family":"system-ui, sans-serif","font-weight":"700","dominant-baseline":"middle","pointer-events":"none"});tl.forEach(n=>root.appendChild(svgEl("text",{x:x+10,y:yForStep(TREBLE_TOP,n.step)+3,fill:"#c2410c","text-anchor":"end"})).textContent=n.letter);ts.forEach(n=>root.appendChild(svgEl("text",{x:x+30,y:yForStep(TREBLE_TOP,n.step)+3,fill:"#c2410c","text-anchor":"end"})).textContent=n.letter);bl.forEach(n=>root.appendChild(svgEl("text",{x:x+10,y:yForStep(BASS_TOP,n.step)+3,fill:"#1d4ed8","text-anchor":"end"})).textContent=n.letter);bs.forEach(n=>root.appendChild(svgEl("text",{x:x+30,y:yForStep(BASS_TOP,n.step)+3,fill:"#1d4ed8","text-anchor":"end"})).textContent=n.letter);helpLayer.appendChild(root)}function ledger(p,x,step,clef,c="currentColor"){const lines=[];if(clef==="treble"&&step<=-2)lines.push(yForStep(TREBLE_TOP,-2));if(clef==="bass"&&step>=10)lines.push(yForStep(BASS_TOP,10));lines.forEach(y=>p.appendChild(svgEl("line",{x1:x-19,x2:x+19,y1:y,y2:y,stroke:c,"stroke-width":"1.5","pointer-events":"none"})))}function stemData(x,y,step,downOverride=null,forcedY=null){const down=downOverride??stemGoesDown(step),stemX=down?x-NOTE_RX+1:x+NOTE_RX-1,natural=down?y+48:y-48;return{down,stemX,stemEndY:forcedY??natural}}function rhythmNote(p,{x,y,step,rhythm="crotchet",colour="currentColor",opacity=1,preview=false,showFlag=true,downOverride=null,forcedStemEndY=null}){const open=rhythm==="minim",hasStem=["minim","crotchet","dotted-crotchet","quaver"].includes(rhythm),sd=stemData(x,y,step,downOverride,forcedStemEndY),g=svgEl("g",{opacity,"pointer-events":"none"});g.appendChild(svgEl("ellipse",{cx:x,cy:y,rx:NOTE_RX,ry:NOTE_RY,transform:`rotate(-18 ${x} ${y})`,fill:open?"transparent":colour,stroke:colour,"stroke-width":preview?"2":"2.2"}));if(hasStem)g.appendChild(svgEl("line",{x1:sd.stemX,x2:sd.stemX,y1:y,y2:sd.stemEndY,stroke:colour,"stroke-width":"2"}));if(rhythm==="dotted-crotchet")g.appendChild(svgEl("circle",{cx:x+18,cy:y-5,r:"2.4",fill:colour}));if(rhythm==="quaver"&&showFlag){const d=sd.down?`M ${sd.stemX} ${sd.stemEndY} C ${sd.stemX+22} ${sd.stemEndY-8}, ${sd.stemX+21} ${sd.stemEndY-24}, ${sd.stemX+4} ${sd.stemEndY-31}`:`M ${sd.stemX} ${sd.stemEndY} C ${sd.stemX+22} ${sd.stemEndY+8}, ${sd.stemX+21} ${sd.stemEndY+24}, ${sd.stemX+4} ${sd.stemEndY+31}`;g.appendChild(svgEl("path",{d,fill:"none",stroke:colour,"stroke-width":"2.2","stroke-linecap":"round"}))}p.appendChild(g)}function beam(p,a,b,c="currentColor"){if(!a||!b)return;p.appendChild(svgEl("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:c,"stroke-width":"5","stroke-linecap":"butt","pointer-events":"none"}))}function pointerToSvg(evt){const p=svg.createSVGPoint();p.x=evt.clientX;p.y=evt.clientY;return p.matrixTransform(svg.getScreenCTM().inverse())}
function buildExamAnswerSource(){return passage.map((it,i)=>{const isHover=i===activeExamSlot&&examSteps[i]==null&&hoverStep!=null&&examRhythmsSelected[i]!=null;return{noteIndex:it.noteIndex,rhythm:examRhythmsSelected[i],step:isHover?hoverStep:examSteps[i],isHover}})}function normalise(source,correctAnswer,clef){return source.map((it,i)=>{if(!it)return null;const rhythm=correctAnswer?passage[i]?.rhythm:it.rhythm,step=correctAnswer?bassAnswerNotes[passage[i].noteIndex].step:(clef==="treble"?trebleNotes[it.noteIndex].step:it.step);return{...it,rhythm,step}})}function drawPassage(parent,top,clef,source,resultDetails=null,correctAnswer=false,xOffset=0,wrongOnly=false){const positions=getPassagePositions(passage),items=normalise(source,correctAnswer,clef);items.forEach((item,index)=>{if(!item)return;if(wrongOnly&&resultDetails?.[index]?.pitchCorrect&&resultDetails?.[index]?.rhythmCorrect)return;if(!correctAnswer&&clef==="bass"&&(item.step==null||item.rhythm==null))return;const x=(positions[index]??PASSAGE_START_X)+xOffset,y=yForStep(top,item.step),result=resultDetails?.[index];let colour="currentColor";if(correctAnswer){if(result&&(!result.pitchCorrect||!result.rhythmCorrect))colour=GREEN;else return}else if(result){colour=result.pitchCorrect&&result.rhythmCorrect?GREEN:RED}const group=getQuaverGroupBounds(items,index),beamed=Boolean(group),groupDown=group?stemGoesDown(items[group.start].step):null;let beamStart=null,beamEnd=null,forcedY=null;if(group){const sx=positions[group.start]??PASSAGE_START_X,sy=yForStep(top,items[group.start].step),ex=positions[group.end]??PASSAGE_START_X,ey=yForStep(top,items[group.end].step),sd1=stemData(sx,sy,items[group.start].step,groupDown),sd2=stemData(ex,ey,items[group.end].step,groupDown);beamStart={x:sd1.stemX+xOffset,y:sd1.stemEndY};beamEnd={x:sd2.stemX+xOffset,y:sd2.stemEndY};forcedY=getBeamLineYAtX(stemData(x,y,item.step,groupDown).stemX,beamStart,beamEnd)}ledger(parent,x,item.step,clef,colour);rhythmNote(parent,{x,y,step:item.step,rhythm:item.rhythm,colour,showFlag:!beamed,downOverride:groupDown,forcedStemEndY:forcedY,opacity:correctAnswer?.9:(item.isHover?.55:1),preview:item.isHover});if(item.rhythm==="quaver"&&group?.start===index&&group.end>index)beam(parent,beamStart,beamEnd,colour)})}function drawSingle(){const q=trebleNotes[questionIndex],ans=bassAnswerNotes[questionIndex],g=svgEl("g",{transform:`translate(${SINGLE_X} 0)`});ledger(g,0,q.step,"treble");rhythmNote(g,{x:0,y:yForStep(TREBLE_TOP,q.step),step:q.step,rhythm:"crotchet"});questionLayer.appendChild(g);const active=lockedStep??hoverStep;if(active!=null&&feedback!=="incorrect"){const a=svgEl("g",{transform:`translate(${SINGLE_X} 0)`});ledger(a,0,active,"bass");rhythmNote(a,{x:0,y:yForStep(BASS_TOP,active),step:active,rhythm:"crotchet",opacity:lockedStep==null?.55:1,preview:lockedStep==null});answerLayer.appendChild(a)}if(feedback==="incorrect"&&lockedStep!=null&&feedbackDetail){const wrong=svgEl("g",{transform:`translate(${SINGLE_X} 0)`}),wc=feedbackDetail.pitchCorrect?GREEN:RED;ledger(wrong,0,lockedStep,"bass",wc);rhythmNote(wrong,{x:0,y:yForStep(BASS_TOP,lockedStep),step:lockedStep,rhythm:"crotchet",colour:wc});answerLayer.appendChild(wrong);if(!feedbackDetail.pitchCorrect){const corr=svgEl("g",{transform:`translate(${SINGLE_X+70} 0)`});ledger(corr,0,ans.step,"bass",GREEN);rhythmNote(corr,{x:0,y:yForStep(BASS_TOP,ans.step),step:ans.step,rhythm:"crotchet",colour:GREEN});answerLayer.appendChild(corr)}}if(feedback==="correct"&&lockedStep!=null){const ok=svgEl("g",{transform:`translate(${SINGLE_X} 0)`});ledger(ok,0,lockedStep,"bass",GREEN);rhythmNote(ok,{x:0,y:yForStep(BASS_TOP,lockedStep),step:lockedStep,rhythm:"crotchet",colour:GREEN});answerLayer.appendChild(ok)}}
function render(){questionLayer.innerHTML="";answerLayer.innerHTML="";scoreEl.textContent=`${correct}/${attempted}`;accuracyEl.textContent=`${attempted?Math.round(correct/attempted*100):0}%`;streakEl.textContent=streak;footerNote.textContent=`Best streak: ${bestStreak}`;practiceBtn.classList.toggle("active",mode==="notes");examBtn.classList.toggle("active",mode==="exam");helpBtn.classList.toggle("active",showHelp);rhythmPanel.style.display=mode==="exam"&&!feedback?"block":"none";rhythmTitle.textContent=`Choose a rhythm for note ${activeExamSlot+1}:`;drawRhythmButtons();drawHelpLabels();if(mode==="exam"){drawPassage(questionLayer,TREBLE_TOP,"treble",passage);drawPassage(answerLayer,BASS_TOP,"bass",buildExamAnswerSource(),examFeedback);if(feedback==="incorrect")drawPassage(answerLayer,BASS_TOP,"bass",passage,examFeedback,true,24,true)}else drawSingle();const pos=getPassagePositions(passage);hitbox.setAttribute("x",mode==="exam"?(pos[activeExamSlot]??PASSAGE_START_X)-28:SINGLE_X-52);hitbox.setAttribute("y",BASS_TOP-28);hitbox.setAttribute("width",mode==="exam"?56:104);hitbox.setAttribute("height",LINE_GAP*4+98);updateFeedback()}function drawRhythmButtons(){rhythmGrid.innerHTML="";examRhythms.forEach(r=>{const b=document.createElement("button");b.type="button";b.className="rhythm-btn "+(examRhythmsSelected[activeExamSlot]===r.id?"active":"");const icon=document.createElementNS("http://www.w3.org/2000/svg","svg");icon.setAttribute("viewBox","0 0 56 72");rhythmNote(icon,{x:20,y:48,step:4,rhythm:r.id});b.appendChild(icon);const s=document.createElement("span");s.textContent=r.label;b.appendChild(s);b.onclick=()=>selectRhythm(r.id);rhythmGrid.appendChild(b)})}function updateFeedback(){const examReady=mode==="exam"&&passage.every((_,i)=>examSteps[i]!=null&&examRhythmsSelected[i]!=null),canConfirm=mode==="notes"?lockedStep!=null&&!feedback:examReady&&!feedback;undoBtn.style.display=mode==="exam"&&!feedback?"inline-block":"none";undoBtn.disabled=activeExamSlot===0&&examSteps[0]==null&&examRhythmsSelected[0]==null;nextBtn.style.display=mode==="exam"&&feedback?"inline-block":"none";confirmBtn.style.display=mode==="exam"&&feedback?"none":"inline-block";confirmBtn.disabled=!canConfirm;if(rhythmError&&!feedback){feedbackBox.className="feedback-box feedback-error";feedbackBox.textContent=rhythmError;return}feedbackBox.className="feedback-box";if(!feedback&&mode==="exam"){feedbackBox.textContent=examReady?"Click confirm to check your answer.":`Complete note ${activeExamSlot+1} of ${passage.length}. Choose its rhythm first, then place the pitch.`;return}if(!feedback&&mode==="notes"&&lockedStep==null){feedbackBox.textContent="Hover over the bass clef stave, then click or tap to lock in your note.";return}if(!feedback&&mode==="notes"&&lockedStep!=null){feedbackBox.textContent="Click confirm to check your answer.";return}feedbackBox.className="feedback-box "+(feedback==="correct"?"feedback-correct":"feedback-incorrect");feedbackBox.textContent=feedback==="correct"?`${TICK} Correct`:`${CROSS} Incorrect`}
function selectRhythm(id){if(feedback||mode!=="exam")return;examRhythmsSelected[activeExamSlot]=id;rhythmError="";render()}function blockExamPitchUntilRhythm(){if(mode==="exam"&&examRhythmsSelected[activeExamSlot]==null){rhythmError=`Choose a rhythm for note ${activeExamSlot+1} first.`;render();return true}return false}function placeStep(step){if(mode==="exam"){const currentRhythm=examRhythmsSelected[activeExamSlot],nextSlot=Math.min(activeExamSlot+1,passage.length-1);examSteps[activeExamSlot]=step;if(nextSlot!==activeExamSlot&&examRhythmsSelected[nextSlot]==null)examRhythmsSelected[nextSlot]=currentRhythm;activeExamSlot=nextSlot;hoverStep=null}else{lockedStep=step;hoverStep=step}rhythmError="";render()}hitbox.addEventListener("pointermove",e=>{if(feedback)return;if(mode!=="exam"&&lockedStep!=null)return;if(mode==="exam"&&examRhythmsSelected[activeExamSlot]==null)return;hoverStep=clampStep(stepFromPointerY(pointerToSvg(e).y,BASS_TOP));render()});hitbox.addEventListener("pointerdown",e=>{if(feedback||blockExamPitchUntilRhythm())return;placeStep(clampStep(stepFromPointerY(pointerToSvg(e).y,BASS_TOP)))});function nudge(d){if(feedback||blockExamPitchUntilRhythm())return;const base=mode==="exam"?(examSteps[activeExamSlot]??hoverStep??bassAnswerNotes[passage[activeExamSlot].noteIndex].step):(lockedStep??hoverStep??bassAnswerNotes[questionIndex].step);placeStep(clampStep(base+d))}function confirmAnswer(){if(mode==="exam"){const ready=passage.every((_,i)=>examSteps[i]!=null&&examRhythmsSelected[i]!=null);if(!ready)return;examFeedback=passage.map((item,i)=>({pitchCorrect:examSteps[i]===bassAnswerNotes[item.noteIndex].step,rhythmCorrect:examRhythmsSelected[i]===item.rhythm}));const ok=examFeedback.every(x=>x.pitchCorrect&&x.rhythmCorrect);attempted++;if(ok)correct++;streak=ok?streak+1:0;bestStreak=Math.max(bestStreak,streak);feedback=ok?"correct":"incorrect";rhythmError="";render();return}if(lockedStep==null)return;const ok=lockedStep===bassAnswerNotes[questionIndex].step;attempted++;if(ok)correct++;streak=ok?streak+1:0;bestStreak=Math.max(bestStreak,streak);feedback=ok?"correct":"incorrect";feedbackDetail={pitchCorrect:ok,rhythmCorrect:true};rhythmError="";render();timer=setTimeout(nextQuestion,ok?2000:4000)}function nextQuestion(){clearTimeout(timer);questionIndex=randomQuestion(questionIndex);passage=makePassage();examRhythmsSelected=[];examSteps=[];activeExamSlot=0;hoverStep=null;lockedStep=null;feedback=null;feedbackDetail=null;examFeedback=null;rhythmError="";render()}function changeMode(nextMode){clearTimeout(timer);mode=nextMode;nextQuestion()}function resetScore(){correct=0;attempted=0;streak=0;bestStreak=0;nextQuestion()}function undoExam(){if(mode!=="exam"||feedback)return;const target=examSteps[activeExamSlot]==null&&examRhythmsSelected[activeExamSlot]==null?Math.max(activeExamSlot-1,0):activeExamSlot;examSteps[target]=null;examRhythmsSelected[target]=null;activeExamSlot=target;hoverStep=null;rhythmError="";render()}practiceBtn.onclick=()=>changeMode("notes");examBtn.onclick=()=>changeMode("exam");helpBtn.onclick=()=>{showHelp=!showHelp;render()};resetBtn.onclick=resetScore;upBtn.onclick=()=>nudge(1);downBtn.onclick=()=>nudge(-1);confirmBtn.onclick=confirmAnswer;nextBtn.onclick=nextQuestion;undoBtn.onclick=undoExam;drawStaff(trebleStaff,TREBLE_TOP);drawStaff(bassStaff,BASS_TOP);render();
