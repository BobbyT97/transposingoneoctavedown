    { answer: "crotchet-rest", before: [], after: ["quaver"] },
    { answer: "crotchet-rest", before: ["quaver"], after: [] },
    { answer: "quaver-rest", before: [], after: ["quaver-group-2"] },
    { answer: "quaver-rest", before: ["quaver-group-2"], after: [] },

  ];
}
function makeQuestion() {

  });
}
function getBeamLineYAtX(x, start, end) { if (!start || !end || start.x === end.x) return start?.y ?? end?.y ?? 0; return start.y + ((x - start.x) / (end.x - start.x)) * (end.y - start.y); }

function isBeamableRhythm(rhythm) { return ["quaver", "semiquaver", "dotted-quaver"].includes(rhythm); }

function MissingTarget({ box, x, width, systemTop, selectedRest, placedAnswers, onPlace, feedback, onMissingSelection }) {

function Bar({ bar, barIndex, systemTop, startX, endX, isFinalBar, selectedRest, placedAnswers, onPlace, missingBoxesById, feedback, onMissingSelection }) {

}
function Score({ question, selectedRest, placedAnswers, onPlace, feedback, onMissingSelection }) {
  const missingBoxesById = Object.fromEntries(question.missingBoxes.map((box) => [box.id, box]));
  return <svg viewBox={`0 0 ${VIEWBOX_WIDTH} ${VIEWBOX_HEIGHT}`} className="w-full h-auto select-none" aria-label="Rests exercise"><rect x="0" y="0" width={VIEWBOX_WIDTH} height={VIEWBOX_HEIGHT} fill="white" />{SYSTEM_TOPS.map((systemTop, systemIndex) => { const systemStartX = systemIndex === 0 ? FIRST_SYSTEM_MUSIC_START_X : OTHER_SYSTEM_MUSIC_START_X; const barWidth = (STAFF_RIGHT - systemStartX) / BARS_PER_SYSTEM; return <g key={systemIndex}><StaffLines systemTop={systemTop} /><TrebleClef systemTop={systemTop} />{systemIndex === 0 && <TimeSignatureGlyph signature={question.timeSignature} x={TIME_SIG_X} y={systemTop + 20} colour="#000" />}{Array.from({ length: BARS_PER_SYSTEM }, (_, localBarIndex) => { const globalBarIndex = systemIndex * BARS_PER_SYSTEM + localBarIndex; const startX = systemStartX + localBarIndex * barWidth; const endX = systemStartX + (localBarIndex + 1) * barWidth; return <Bar key={globalBarIndex} bar={question.bars[globalBarIndex]} barIndex={globalBarIndex} systemTop={systemTop} startX={startX} endX={endX} isFinalBar={globalBarIndex === BAR_COUNT - 1} selectedRest={selectedRest} placedAnswers={placedAnswers} onPlace={onPlace} missingBoxesById={missingBoxesById} feedback={feedback} onMissingSelection={onMissingSelection} />; })}</g>; })}</svg>;
}
function RestOptionButton({ option, selected, disabled, onClick }) { return <button type="button" disabled={disabled} onClick={onClick} className={`flex items-center justify-center rounded-xl border px-2 py-2 ${selected ? "bg-stone-950 text-white border-stone-950" : "border-stone-300 hover:bg-stone-100"}`} aria-label={option.label} title={option.label}><svg viewBox="0 0 70 90" className="h-12 w-12"><g transform="translate(35,45) scale(1.8) translate(-35,-25)"><Rest rhythm={option.rhythm} x={35} systemTop={10} colour="currentColor" /></g></svg></button>; }
function RestOptions({ selectedRest, disabled, onSelect }) { return <div className="mb-4 grid grid-cols-5 gap-2">{REST_OPTIONS.map((option) => <RestOptionButton key={option.rhythm} option={option} selected={selectedRest === option.rhythm} disabled={disabled} onClick={() => onSelect(option.rhythm)} />)}</div>; }

function HelpGlyphPair({ item }) {

    "dotted-crotchet": { noteX: 22, restX: 56, y: 14, scale: 1.0 },

runChecks();

function Rests() {
  const timeoutRef = useRef(null);
  const warningTimeoutRef = useRef(null);
  const [question, setQuestion] = useState(() => makeQuestion());
  const [selectedRest, setSelectedRest] = useState(null);
  const [placedAnswers, setPlacedAnswers] = useState({});
  const [feedback, setFeedback] = useState(null);
  const [warning, setWarning] = useState("");
  const [semibreveRuleBroken, setSemibreveRuleBroken] = useState(false);
  const [lastAllCorrect, setLastAllCorrect] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);

irm</button></div><Feedback feedback={feedback} allCorrect={lastAllCorrect} warning={warning} semibreveRuleBroken={semibreveRuleBroken} /><div className="mt-4 text-sm text-stone-600">Best streak: {bestStreak}</div></main></div></div>;

ReactDOM.createRoot(document.getElementById('root')).render(<Rests />);
  </script>
