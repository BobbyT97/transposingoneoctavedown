<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repeat Signs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const VIEWBOX_WIDTH = 920;
const VIEWBOX_HEIGHT = 430;
const STAFF_LEFT = 28;
const STAFF_RIGHT = 892;
const SYSTEM_TOPS = [105, 255];
const LINE_GAP = 10;
const BAR_COUNT = 8;
const BARS_PER_SYSTEM = 4;
const NOTE_RX = 6.3;
const NOTE_RY = 4.6;
const STEM_LENGTH = 32;
const CLEF_X = STAFF_LEFT + 8;
const TIME_SIG_X = STAFF_LEFT + 54;
const MUSIC_START_X = STAFF_LEFT + 78;
const TREBLE_CLEF = String.fromCodePoint(0x1d11e);
const TICK = String.fromCodePoint(0x2714);
const CROSS = String.fromCodePoint(0x2716);

const BLUE = "#2563eb";
const GREEN = "#16a34a";
const RED = "#dc2626";

const SYMBOLS = [
  { id: "start-repeat", label: "Start Repeat" },
  { id: "end-repeat", label: "End Repeat" },
  { id: "first-time", label: "1st Time Bar" },
  { id: "second-time", label: "2nd Time Bar" },
  { id: "dc", label: "Da Capo" },
];

const QUESTION_TYPES = [
  { id: "dc", label: "Da Capo" },
  { id: "straight-repeat", label: "Repeat Signs" },
  { id: "first-second", label: "1st and 2nd Time Bars" },
];

const TIME_SIGNATURES = [
  { id: "2/4", top: "2", bottom: "4", beats: 2, compound: false },
  { id: "3/4", top: "3", bottom: "4", beats: 3, compound: false },
  { id: "4/4", top: "4", bottom: "4", beats: 4, compound: false },
  { id: "6/8", top: "6", bottom: "8", beats: 6, compound: true },
];

const NOTE_POOL = [
  { name: "C4", step: -2, frequency: 261.63 },
  { name: "D4", step: -1, frequency: 293.66 },
  { name: "E4", step: 0, frequency: 329.63 },
  { name: "F4", step: 1, frequency: 349.23 },
  { name: "G4", step: 2, frequency: 392.0 },
  { name: "A4", step: 3, frequency: 440.0 },
  { name: "B4", step: 4, frequency: 493.88 },
  { name: "C5", step: 5, frequency: 523.25 },
  { name: "D5", step: 6, frequency: 587.33 },
  { name: "E5", step: 7, frequency: 659.25 },
  { name: "F5", step: 8, frequency: 698.46 },
  { name: "G5", step: 9, frequency: 783.99 },
  { name: "A5", step: 10, frequency: 880.0 },
];

const RHYTHMS = {
  semibreve: { beats: 4, spacing: 4.4, open: true, stem: false, flag: false },
  dottedMinim: { beats: 3, spacing: 3.4, open: true, stem: true, flag: false, dotted: true },
  minim: { beats: 2, spacing: 2.6, open: true, stem: true, flag: false },
  dottedCrotchet: { beats: 1.5, spacing: 2.15, open: false, stem: true, flag: false, dotted: true },
  crotchet: { beats: 1, spacing: 1.65, open: false, stem: true, flag: false },
  quaver: { beats: 0.5, spacing: 0.95, open: false, stem: true, flag: true },
};

const SIMPLE_BAR_PATTERNS = {
  2: [
    ["crotchet", "crotchet"],
    ["minim"],
    ["quaver", "quaver", "crotchet"],
    ["crotchet", "quaver", "quaver"],
    ["quaver", "quaver", "quaver", "quaver"],
  ],
  3: [
    ["crotchet", "crotchet", "crotchet"],
    ["minim", "crotchet"],
    ["crotchet", "minim"],
    ["quaver", "quaver", "crotchet", "crotchet"],
    ["crotchet", "quaver", "quaver", "crotchet"],
    ["crotchet", "crotchet", "quaver", "quaver"],
  ],
  4: [
    ["crotchet", "crotchet", "crotchet", "crotchet"],
    ["minim", "minim"],
    ["minim", "crotchet", "crotchet"],
    ["crotchet", "crotchet", "minim"],
    ["quaver", "quaver", "crotchet", "crotchet", "crotchet"],
    ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
    ["quaver", "quaver", "quaver", "quaver", "crotchet", "crotchet"],
  ],
};

const SIX_EIGHT_PATTERNS = [
  ["dottedCrotchet", "dottedCrotchet"],
  ["quaver", "quaver", "quaver", "quaver", "quaver", "quaver"],
  ["dottedCrotchet", "quaver", "quaver", "quaver"],
  ["quaver", "quaver", "quaver", "dottedCrotchet"],
  ["crotchet", "quaver", "crotchet", "quaver"],
  ["crotchet", "quaver", "dottedCrotchet"],
  ["dottedCrotchet", "crotchet", "quaver"],
];

const CHORDS = {
  C: ["C", "E", "G"],
  F: ["F", "A", "C"],
  G: ["G", "B", "D"],
  Am: ["A", "C", "E"],
  Dm: ["D", "F", "A"],
};

const PROGRESSIONS = [
  ["C", "F", "Am", "G", "C", "F", "G", "C"],
  ["C", "Am", "F", "G", "C", "F", "G", "C"],
  ["C", "Dm", "F", "G", "Am", "F", "G", "C"],
  ["C", "F", "C", "G", "Am", "F", "G", "C"],
];

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function rhythmInfo(rhythm) {
  return RHYTHMS[rhythm] ?? RHYTHMS.crotchet;
}

function yForStep(step, systemTop) {
  return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2);
}

function stemGoesDown(step) {
  return step > 4;
}

function noteIndexFromLetter(letter, preferredIndex = 7) {
  const candidates = NOTE_POOL
    .map((note, index) => ({ ...note, index }))
    .filter((note) => note.name[0] === letter);

  return candidates.reduce((best, item) =>
    Math.abs(item.index - preferredIndex) < Math.abs(best.index - preferredIndex) ? item : best
  , candidates[0]).index;
}

function weightedItem(items) {
  const total = items.reduce((sum, item) => sum + item.weight, 0);
  let roll = Math.random() * total;

  for (const item of items) {
    roll -= item.weight;
    if (roll <= 0) return item.value;
  }

  return items[items.length - 1].value;
}

function getBeatPositions(pattern) {
  let beat = 0;
  return pattern.map((rhythm) => {
    const start = beat;
    beat += rhythmInfo(rhythm).beats;
    return start;
  });
}

function isStrongBeat(startBeat, timeSignature) {
  return (
    startBeat === 0 ||
    (timeSignature.id === "4/4" && startBeat === 2) ||
    (timeSignature.id === "6/8" && startBeat === 3)
  );
}

function quaverCanUsePassingNote(pattern, noteIndex) {
  return pattern[noteIndex] === "quaver" && pattern[noteIndex - 1] === "quaver";
}

function frequencyForStep(step) {
  return NOTE_POOL.find((note) => note.step === step)?.frequency ?? 440;
}

function frequencyForLetter(letter, octave = 3) {
  const semitoneMap = { C: -9, D: -7, E: -5, F: -4, G: -2, A: 0, B: 2 };
  return 440 * Math.pow(2, (semitoneMap[letter] + (octave - 4) * 12) / 12);
}

function chordFrequencies(chordName) {
  return (CHORDS[chordName] ?? CHORDS.C).map((letter) =>
    frequencyForLetter(letter, letter === "B" ? 2 : 3)
  );
}

function barDurationSeconds(bar, beatSeconds) {
  return bar.notes.reduce((sum, note) => sum + rhythmInfo(note.rhythm).beats * beatSeconds, 0);
}

function choosePatternForBar(timeSignature, barIndex, motifs) {
  if (barIndex === 7) {
    return {
      "2/4": ["minim"],
      "3/4": ["dottedMinim"],
      "4/4": ["semibreve"],
      "6/8": ["dottedMinim"],
    }[timeSignature.id];
  }

  const source = timeSignature.compound ? SIX_EIGHT_PATTERNS : SIMPLE_BAR_PATTERNS[timeSignature.beats];

  if (barIndex === 1 && motifs[0] && Math.random() < 0.65) return motifs[0];
  if (barIndex === 3 && motifs[0] && Math.random() < 0.45) return motifs[0];
  if (barIndex === 5 && motifs[4] && Math.random() < 0.55) return motifs[4];

  if (barIndex === 6 && Math.random() < 0.45) {
    if (timeSignature.id === "2/4") return ["crotchet", "crotchet"];
    if (timeSignature.id === "3/4") return ["minim", "crotchet"];
    if (timeSignature.id === "4/4") return ["minim", "crotchet", "crotchet"];
    if (timeSignature.id === "6/8") return ["dottedCrotchet", "crotchet", "quaver"];
  }

  return randomItem(source);
}

function chooseMusicalNoteIndex({
  previousIndex,
  previousMove,
  chordLetters,
  strongBeat,
  allowPassingNotes,
  forceStepwise,
  barIndex,
  noteIndex,
  noteCount,
}) {
  if (barIndex === 0 && noteIndex === 0) {
    return randomItem([noteIndexFromLetter("C", 0), noteIndexFromLetter("C", 7)]);
  }

  if (barIndex === 7 && noteIndex === noteCount - 1) {
    return randomItem([noteIndexFromLetter("C", 0), noteIndexFromLetter("C", 7)]);
  }

  const contourBias = barIndex < 3 ? 1 : barIndex > 3 ? -1 : 0;
  const finalPhrase = barIndex >= 6;
  const candidates = [];

  NOTE_POOL.forEach((note, index) => {
    const letter = note.name[0];
    const isChordTone = chordLetters.includes(letter);

    if (!isChordTone && !allowPassingNotes) return;

    const distance = index - previousIndex;
    const absDistance = Math.abs(distance);

    if (forceStepwise && absDistance !== 1) return;

    let weight = 1;

    if (strongBeat) weight *= isChordTone ? 10 : 0;
    else weight *= isChordTone ? 4 : 2.5;

    if (absDistance === 0) weight *= 2.1;
    if (absDistance === 1) weight *= 5.5;
    if (absDistance === 2) weight *= 3.1;
    if (absDistance === 3) weight *= 1.1;
    if (absDistance >= 4) weight *= 0.15;

    if (previousMove >= 3 && distance < 0 && absDistance <= 2) weight *= 4;
    if (previousMove <= -3 && distance > 0 && absDistance <= 2) weight *= 4;
    if (Math.abs(previousMove) >= 3 && Math.sign(distance) === Math.sign(previousMove)) weight *= 0.2;

    if (contourBias > 0 && distance > 0) weight *= 1.7;
    if (contourBias < 0 && distance < 0) weight *= 1.7;

    if (finalPhrase && ["G", "D", "B", "C", "E"].includes(letter)) weight *= 1.6;
    if (barIndex === 7 && ["C", "E", "G"].includes(letter)) weight *= 3;

    if (index < 1 || index > NOTE_POOL.length - 2) weight *= 0.35;

    candidates.push({ value: index, weight });
  });

  return weightedItem(candidates.length ? candidates : [{ value: previousIndex, weight: 1 }]);
}

function makeBars(timeSignature) {
  const bars = [];
  const motifs = {};
  const progression = [...randomItem(PROGRESSIONS)];
  progression[2] = progression[2] === "G" ? "F" : progression[2];
  progression[3] = "G";

  let previousIndex = noteIndexFromLetter("C", 7);
  let previousMove = 0;

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const pattern = choosePatternForBar(timeSignature, barIndex, motifs);
    motifs[barIndex] = pattern;

    const beatPositions = getBeatPositions(pattern);
    const chordName = progression[barIndex] ?? "C";
    const chordLetters = CHORDS[chordName] ?? CHORDS.C;

    const notes = pattern.map((rhythm, noteIndex) => {
      const nextIndex = chooseMusicalNoteIndex({
        previousIndex,
        previousMove,
        chordLetters,
        strongBeat: isStrongBeat(beatPositions[noteIndex], timeSignature),
        allowPassingNotes: quaverCanUsePassingNote(pattern, noteIndex),
        forceStepwise: rhythm === "quaver",
        barIndex,
        noteIndex,
        noteCount: pattern.length,
      });

      const note = {
        id: `${barIndex}-${noteIndex}`,
        barIndex,
        noteIndex,
        rhythm,
        step: NOTE_POOL[nextIndex].step,
        chord: chordName,
      };

      previousMove = nextIndex - previousIndex;
      previousIndex = nextIndex;
      return note;
    });

    bars.push({ barIndex, notes, chord: chordName });
  }

  const bar7Last = bars[6]?.notes?.[bars[6].notes.length - 1];
  const bar8First = bars[7]?.notes?.[0];
  const bar8FirstIndex = NOTE_POOL.findIndex((note) => note.step === bar8First?.step);

  if (bar7Last && bar8FirstIndex >= 0) {
    const candidates = [bar8FirstIndex - 1, bar8FirstIndex + 1].filter(
      (index) => index >= 0 && index < NOTE_POOL.length
    );
    bar7Last.step = NOTE_POOL[randomItem(candidates)].step;
  }

  return bars;
}

function makeQuestion(options = {}) {
  const enabledTypes = options.enabledTypes?.length ? options.enabledTypes : QUESTION_TYPES.map((type) => type.id);
  const timeSignature = randomItem(TIME_SIGNATURES);
  const type = randomItem(enabledTypes);
  const bars = makeBars(timeSignature);
  const prompt = "Listen to the excerpt and insert the appropriate repeat symbols so that the written music matches what you hear.";

  let performedOrder = [];
  let required = [];

  if (type === "dc") {
    performedOrder = [0, 1, 2, 3, 4, 5, 6, 7, 0, 1, 2, 3, 4, 5, 6, 7];
    required = [{ symbolId: "dc", barIndex: 7, anchor: "above" }];
  }

  if (type === "straight-repeat") {
    const repeat = randomItem([
      { start: 0, end: 3 },
      { start: 4, end: 7 },
    ]);

    performedOrder = [
      ...Array.from({ length: repeat.end + 1 }, (_, i) => i),
      ...Array.from({ length: repeat.end - repeat.start + 1 }, (_, i) => repeat.start + i),
      ...Array.from({ length: BAR_COUNT - repeat.end - 1 }, (_, i) => repeat.end + 1 + i),
    ];

    required = [
      { symbolId: "start-repeat", barIndex: repeat.start, anchor: "start", optional: repeat.start === 0 },
      { symbolId: "end-repeat", barIndex: repeat.end, anchor: "end" },
    ];
  }

  if (type === "first-second") {
    performedOrder = [0, 1, 2, 3, 4, 5, 6, 4, 5, 7];
    required = [
      { symbolId: "start-repeat", barIndex: 4, anchor: "start" },
      { symbolId: "end-repeat", barIndex: 6, anchor: "end" },
      { symbolId: "first-time", barIndex: 6, anchor: "above" },
      { symbolId: "second-time", barIndex: 7, anchor: "above" },
    ];
  }

  return {
    id: Math.random().toString(36).slice(2),
    type,
    timeSignature,
    bars,
    prompt,
    performedOrder,
    required,
  };
}

function getBarWidth() {
  return (STAFF_RIGHT - MUSIC_START_X) / BARS_PER_SYSTEM;
}

function getBarGeometry(barIndex) {
  const systemIndex = Math.floor(barIndex / BARS_PER_SYSTEM);
  const localBarIndex = barIndex % BARS_PER_SYSTEM;
  const systemTop = SYSTEM_TOPS[systemIndex];
  const barWidth = getBarWidth();
  const startX = MUSIC_START_X + localBarIndex * barWidth;
  const endX = startX + barWidth;
  return { barIndex, systemIndex, localBarIndex, systemTop, startX, endX, barWidth };
}

function getBarNotePositions(notes, startX, endX) {
  const units = notes.reduce((sum, note) => sum + rhythmInfo(note.rhythm).spacing, 0);
  const unitWidth = Math.max(1, endX - startX) / Math.max(1, units);
  let cursor = startX + unitWidth * 0.38;

  return notes.map((note) => {
    const x = cursor;
    cursor += rhythmInfo(note.rhythm).spacing * unitWidth;
    return x;
  });
}

function buildLayouts(question) {
  return question.bars.map((bar) => {
    const geo = getBarGeometry(bar.barIndex);
    return {
      ...geo,
      bar,
      positions: getBarNotePositions(bar.notes, geo.startX + 12, geo.endX - 12),
    };
  });
}

function getStemData(note, x, systemTop, forcedDown = null) {
  const y = yForStep(note.step, systemTop);
  const down = forcedDown ?? stemGoesDown(note.step);
  const stemX = down ? x - NOTE_RX : x + NOTE_RX;
  const stemEndY = down ? y + STEM_LENGTH : y - STEM_LENGTH;
  return { y, down, stemX, stemEndY };
}

function getQuaverGroups(notes, timeSignature = null) {
  const groups = [];
  let index = 0;

  while (index < notes.length) {
    if (notes[index].rhythm !== "quaver") {
      index += 1;
      continue;
    }

    const start = index;
    while (index < notes.length && notes[index].rhythm === "quaver") index += 1;
    const end = index - 1;

    if (end > start) {
      if (timeSignature?.id === "6/8") {
        for (let groupStart = start; groupStart <= end; groupStart += 3) {
          const groupEnd = Math.min(groupStart + 2, end);
          if (groupEnd > groupStart) groups.push({ start: groupStart, end: groupEnd });
        }
      } else {
        groups.push({ start, end });
      }
    }
  }

  return groups;
}

function groupContaining(groups, noteIndex) {
  return groups.find((group) => noteIndex >= group.start && noteIndex <= group.end) ?? null;
}

function getBeamData(notes, positions, systemTop) {
  const averageStep = notes.reduce((sum, note) => sum + note.step, 0) / notes.length;
  const down = averageStep > 4;
  const first = getStemData(notes[0], positions[0], systemTop, down);
  const last = getStemData(notes[notes.length - 1], positions[positions.length - 1], systemTop, down);
  return {
    down,
    start: { x: first.stemX, y: first.stemEndY },
    end: { x: last.stemX, y: last.stemEndY },
  };
}

function beamYAtX(x, beam) {
  if (!beam || beam.start.x === beam.end.x) return beam?.start.y ?? 0;
  const progress = (x - beam.start.x) / (beam.end.x - beam.start.x);
  return beam.start.y + progress * (beam.end.y - beam.start.y);
}

function placementKey(p) {
  return `${p.symbolId}:${p.barIndex}:${p.anchor}`;
}

function requiredMatches(required, placements) {
  return required
    .filter((item) => !item.optional)
    .every((item) => placements.some((p) => placementKey(p) === placementKey(item)));
}

function placementsMatchScenario(question, placements) {
  if (question.type === "dc") {
    const hasDc = placements.some((p) => p.symbolId === "dc" && p.barIndex === 7 && p.anchor === "above");
    const hasEndRepeat = placements.some((p) => p.symbolId === "end-repeat" && p.barIndex === 7 && p.anchor === "end");
    const badDcBelow = placements.some((p) => p.symbolId === "dc" && p.anchor === "below");
    return (hasDc || hasEndRepeat) && !badDcBelow;
  }

  return requiredMatches(question.required, placements);
}

function getMissingRequired(question, placements) {
  if (question.type === "dc") return placementsMatchScenario(question, placements) ? [] : question.required;

  return question.required.filter(
    (item) => !item.optional && !placements.some((p) => placementKey(p) === placementKey(item))
  );
}

function getWrongPlacements(question, placements) {
  if (question.type === "dc") {
    const accepted =
      placements.some((p) => p.symbolId === "dc" && p.barIndex === 7 && p.anchor === "above") ||
      placements.some((p) => p.symbolId === "end-repeat" && p.barIndex === 7 && p.anchor === "end");

    if (accepted) {
      return placements.filter(
        (p) =>
          !(p.symbolId === "dc" && p.barIndex === 7 && p.anchor === "above") &&
          !(p.symbolId === "end-repeat" && p.barIndex === 7 && p.anchor === "end") &&
          !(p.symbolId === "start-repeat" && p.barIndex === 0 && p.anchor === "start")
      );
    }
  }

  return placements.filter((p) => {
    if (question.required.some((item) => placementKey(item) === placementKey(p))) return false;
    return !(
      p.symbolId === "start-repeat" &&
      p.barIndex === 0 &&
      question.required.some((item) => item.symbolId === "start-repeat" && item.optional)
    );
  });
}

function snapPlacement(pointer, selectedSymbolId) {
  if (!selectedSymbolId) return null;

  const systemIndex = pointer.y < (SYSTEM_TOPS[0] + SYSTEM_TOPS[1]) / 2 ? 0 : 1;
  const systemTop = SYSTEM_TOPS[systemIndex];
  const local = clamp(Math.floor((pointer.x - MUSIC_START_X) / getBarWidth()), 0, BARS_PER_SYSTEM - 1);
  const barIndex = systemIndex * BARS_PER_SYSTEM + local;

  if (selectedSymbolId === "start-repeat") return { symbolId: selectedSymbolId, barIndex, anchor: "start" };
  if (selectedSymbolId === "end-repeat") return { symbolId: selectedSymbolId, barIndex, anchor: "end" };
  if (selectedSymbolId === "first-time" || selectedSymbolId === "second-time") {
    return { symbolId: selectedSymbolId, barIndex, anchor: "above" };
  }

  if (selectedSymbolId === "dc") {
    return {
      symbolId: selectedSymbolId,
      barIndex,
      anchor: pointer.y > systemTop + LINE_GAP * 4 + 18 ? "below" : "above",
    };
  }

  return null;
}

function placementPosition(placement) {
  const geo = getBarGeometry(placement.barIndex);

  if (placement.anchor === "start") {
    const extraOffset = placement.barIndex === 0 || placement.barIndex === 4 ? 6 : 0;
    return { x: geo.startX - 3 - extraOffset, y: geo.systemTop, ...geo };
  }

  if (placement.anchor === "end") return { x: geo.endX + 4, y: geo.systemTop, ...geo };
  if (placement.anchor === "below") return { x: geo.endX - 30, y: geo.systemTop + 74, ...geo };
  if (placement.symbolId === "dc") return { x: geo.endX - 30, y: geo.systemTop - 35, ...geo };
  return { x: geo.startX + 10, y: geo.systemTop - 38, ...geo };
}

function LedgerLines({ x, step, systemTop, colour }) {
  const lines = [];
  if (step <= -2) lines.push(yForStep(-2, systemTop));
  if (step >= 10) lines.push(yForStep(10, systemTop));

  return (
    <g>
      {lines.map((y) => (
        <line key={y} x1={x - 12} x2={x + 12} y1={y} y2={y} stroke={colour} strokeWidth="1.2" />
      ))}
    </g>
  );
}

function Flag({ stemX, stemEndY, down, colour }) {
  const d = down
    ? `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY - 4}, ${stemX + 10} ${stemEndY - 12}, ${stemX + 2} ${stemEndY - 16}`
    : `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY + 4}, ${stemX + 10} ${stemEndY + 12}, ${stemX + 2} ${stemEndY + 16}`;

  return <path d={d} fill="none" stroke={colour} strokeWidth="1.7" strokeLinecap="round" />;
}

function Note({ note, x, systemTop, colour = "currentColor", forcedStemDown = null, forcedStemEndY = null, showFlag = true }) {
  const info = rhythmInfo(note.rhythm);
  const stem = getStemData(note, x, systemTop, forcedStemDown);
  const stemEndY = forcedStemEndY ?? stem.stemEndY;
  const isLineNote = note.step % 2 === 0;
  const dotOffset = note.step % 2 !== 0 ? 0 : -4;

  return (
    <g>
      <LedgerLines x={x} step={note.step} systemTop={systemTop} colour={colour} />
      <ellipse
        cx={x}
        cy={stem.y}
        rx={NOTE_RX}
        ry={NOTE_RY}
        transform={`rotate(-18 ${x} ${stem.y})`}
        fill={info.open ? "white" : colour}
        stroke={colour}
        strokeWidth="1.7"
      />
      {info.dotted && <circle cx={x + 12} cy={stem.y + dotOffset} r="1.7" fill={colour} />}
      {isLineNote && <line x1={x - 8} x2={x + 8} y1={stem.y} y2={stem.y} stroke={colour} strokeWidth="1.2" />}
      {info.stem && <line x1={stem.stemX} x2={stem.stemX} y1={stem.y} y2={stemEndY} stroke={colour} strokeWidth="1.5" />}
      {info.flag && showFlag && <Flag stemX={stem.stemX} stemEndY={stemEndY} down={stem.down} colour={colour} />}
    </g>
  );
}

function Beam({ beam, colour = "currentColor" }) {
  return (
    <line
      x1={beam.start.x - 1}
      y1={beam.start.y}
      x2={beam.end.x + 1}
      y2={beam.end.y}
      stroke={colour}
      strokeWidth="4"
      strokeLinecap="butt"
    />
  );
}

function StaffLines({ systemTop }) {
  return (
    <g>
      {[0, 1, 2, 3, 4].map((i) => (
        <line
          key={i}
          x1={STAFF_LEFT}
          x2={STAFF_RIGHT}
          y1={systemTop + i * LINE_GAP}
          y2={systemTop + i * LINE_GAP}
          stroke="currentColor"
          strokeWidth="1.2"
        />
      ))}
    </g>
  );
}

function TrebleClef({ systemTop }) {
  return (
    <text x={CLEF_X} y={systemTop + 28} fontSize="80" fontFamily="serif" dominantBaseline="middle">
      {TREBLE_CLEF}
    </text>
  );
}

function TimeSignature({ signature, systemTop }) {
  return (
    <g fontFamily="serif" fontWeight="900" fontSize="30" textAnchor="middle" fill="currentColor">
      <text x={TIME_SIG_X} y={systemTop + 20}>{signature.top}</text>
      <text x={TIME_SIG_X} y={systemTop + 39}>{signature.bottom}</text>
    </g>
  );
}

function StartRepeatGlyph({ x, y, colour = "currentColor", opacity = 1 }) {
  return (
    <g opacity={opacity} stroke={colour} fill={colour}>
      <line x1={x + 5} x2={x + 5} y1={y} y2={y + LINE_GAP * 4} strokeWidth="4" />
      <line x1={x + 11} x2={x + 11} y1={y} y2={y + LINE_GAP * 4} strokeWidth="1.5" />
      <circle cx={x + 18} cy={y + 15} r="2.55" />
      <circle cx={x + 18} cy={y + 25} r="2.55" />
    </g>
  );
}

function EndRepeatGlyph({ x, y, colour = "currentColor", opacity = 1 }) {
  return (
    <g opacity={opacity} stroke={colour} fill={colour}>
      <line x1={x - 11} x2={x - 11} y1={y} y2={y + LINE_GAP * 4} strokeWidth="1.5" />
      <line x1={x - 5} x2={x - 5} y1={y} y2={y + LINE_GAP * 4} strokeWidth="4" />
      <circle cx={x - 18} cy={y + 15} r="2.55" />
      <circle cx={x - 18} cy={y + 25} r="2.55" />
    </g>
  );
}

function TimeBarGlyph({ placement, colour = "currentColor", opacity = 1 }) {
  const pos = placementPosition(placement);
  const width = Math.min(92, pos.barWidth - 22);
  const label = placement.symbolId === "first-time" ? "1." : "2.";

  return (
    <g opacity={opacity} stroke={colour} fill="none" strokeWidth="2" strokeLinecap="square">
      <path d={`M ${pos.startX + 9} ${pos.systemTop - 24} L ${pos.startX + 9} ${pos.systemTop - 35} L ${pos.startX + 9 + width} ${pos.systemTop - 35}`} />
      <text x={pos.startX + 17} y={pos.systemTop - 38} fill={colour} stroke="none" fontFamily="serif" fontSize="18" fontWeight="800">{label}</text>
    </g>
  );
}

function DcGlyph({ placement, colour = "currentColor", opacity = 1 }) {
  const pos = placementPosition(placement);
  return (
    <text x={pos.x} y={pos.y} opacity={opacity} fill={colour} fontFamily="serif" fontSize="24" fontWeight="900" textAnchor="middle">
      D.C.
    </text>
  );
}

function PlacementGlyph({ placement, colour = "currentColor", opacity = 1 }) {
  if (!placement) return null;
  const pos = placementPosition(placement);

  if (placement.symbolId === "start-repeat") return <StartRepeatGlyph x={pos.x} y={pos.y} colour={colour} opacity={opacity} />;
  if (placement.symbolId === "end-repeat") return <EndRepeatGlyph x={pos.x} y={pos.y} colour={colour} opacity={opacity} />;
  if (placement.symbolId === "first-time" || placement.symbolId === "second-time") {
    return <TimeBarGlyph placement={placement} colour={colour} opacity={opacity} />;
  }
  if (placement.symbolId === "dc") return <DcGlyph placement={placement} colour={colour} opacity={opacity} />;

  return null;
}

function SymbolButtonGlyph({ id }) {
  return (
    <svg viewBox="0 0 100 54" className="h-10 w-16 overflow-visible" aria-hidden="true">
      {id === "start-repeat" && <StartRepeatGlyph x={18} y={8} />}
      {id === "end-repeat" && <EndRepeatGlyph x={82} y={8} />}

          <text x="28" y="2" fill="currentColor" stroke="none" fontFamily="serif" fontSize="17" fontWeight="900">2.</text>
        </g>
      )}

      {id === "dc" && (
        <text x="50" y="29" fill="currentColor" fontFamily="serif" fontSize="24" fontWeight="900" textAnchor="middle">

        </text>
      )}
    </svg>
  );
}

function CustomiseQuestionGlyph({ typeId }) {
  return (
    <svg viewBox="0 0 100 78" className="h-12 w-16 overflow-visible" aria-hidden="true">
      {typeId === "dc" && (
        <text x="50" y="43" fill="currentColor" fontFamily="serif" fontSize="24" fontWeight="900" textAnchor="middle">

        </text>
      )}

      {typeId === "straight-repeat" && (
        <g transform="translate(0 8)">
          <StartRepeatGlyph x={16} y={6} />
          <EndRepeatGlyph x={84} y={6} />
        </g>
      )}

      {typeId === "first-second" && (
        <g stroke="currentColor" fill="none" strokeWidth="2">
          <path d="M 20 30 L 20 16 L 76 16" />
          <text x="28" y="14" fill="currentColor" stroke="none" fontFamily="serif" fontSize="17" fontWeight="900">1.</text>
          <path d="M 20 67 L 20 53 L 76 53" />
          <text x="28" y="51" fill="currentColor" stroke="none" fontFamily="serif" fontSize="17" fontWeight="900">2.</text>
        </g>
      )}
    </svg>
  );
}

function Score({
  question,
  selectedSymbolId,
  placements,
  hoverPlacement,
  feedback,
  wrongPlacements,
  missingPlacements,
  activePlaybackNoteId,
  onPointerMove,
  onPointerLeave,
  onLockPlacement,
}) {
  const layouts = useMemo(() => buildLayouts(question), [question]);

  return (
    <svg
      viewBox={`0 0 ${VIEWBOX_WIDTH} ${VIEWBOX_HEIGHT}`}
      className="w-full h-auto select-none touch-none"
      aria-label="Repeat signs exercise"
      onPointerMove={onPointerMove}
      onPointerLeave={onPointerLeave}
      onPointerDown={onLockPlacement}
    >
      <rect x="0" y="0" width={VIEWBOX_WIDTH} height={VIEWBOX_HEIGHT} fill="white" />

      {SYSTEM_TOPS.map((systemTop, i) => (
        <g key={i}>
          <StaffLines systemTop={systemTop} />
          <TrebleClef systemTop={systemTop} />
          {i === 0 && <TimeSignature signature={question.timeSignature} systemTop={systemTop} />}
        </g>
      ))}

      {layouts.map((layout) => {
        const groups = getQuaverGroups(layout.bar.notes, question.timeSignature);

        return (
          <g key={layout.barIndex}>
            <rect x={layout.startX - 8} y={layout.systemTop - 46} width={48} height={34} fill="white" />
            <text
              x={layout.startX + 4}
              y={layout.systemTop - 34}
              textAnchor="start"
              fontSize="13"
              fontWeight="700"
              fill="black"
              opacity="0.1"
            >
              {layout.bar.chord}
            </text>
            <text x={layout.startX + 4} y={layout.systemTop - 18} textAnchor="start" fontSize="13" fontWeight="500" fill="black">
              {layout.barIndex + 1}
            </text>

            {layout.bar.notes.map((note, noteIndex) => {
              const group = groupContaining(groups, noteIndex);
              const beam = group
                ? getBeamData(
                    layout.bar.notes.slice(group.start, group.end + 1),
                    layout.positions.slice(group.start, group.end + 1),
                    layout.systemTop
                  )
                : null;
              const stem = beam ? getStemData(note, layout.positions[noteIndex], layout.systemTop, beam.down) : null;

              return (
                <Note
                  key={note.id}
                  note={note}
                  x={layout.positions[noteIndex]}
                  systemTop={layout.systemTop}
                  colour={activePlaybackNoteId === note.id ? BLUE : "currentColor"}
                  forcedStemDown={beam ? beam.down : null}
                  forcedStemEndY={beam ? beamYAtX(stem.stemX, beam) : null}
                  showFlag={!beam}
                />
              );
            })}

            {groups.map((group, index) => (
              <Beam
                key={index}
                beam={getBeamData(
                  layout.bar.notes.slice(group.start, group.end + 1),
                  layout.positions.slice(group.start, group.end + 1),
                  layout.systemTop
                )}
              />
            ))}

            {layout.barIndex === 7 ? (
              <g>
                <line x1={layout.endX - 5} x2={layout.endX - 5} y1={layout.systemTop} y2={layout.systemTop + LINE_GAP * 4} stroke="currentColor" strokeWidth="1.4" />
                <line x1={layout.endX} x2={layout.endX} y1={layout.systemTop} y2={layout.systemTop + LINE_GAP * 4} stroke="currentColor" strokeWidth="4" />
              </g>
            ) : (
              <line x1={layout.endX} x2={layout.endX} y1={layout.systemTop} y2={layout.systemTop + LINE_GAP * 4} stroke="currentColor" strokeWidth="1.4" />
            )}
          </g>
        );
      })}

      {placements.map((placement) => {
        const isWrong = feedback && wrongPlacements.some((wrong) => placementKey(wrong) === placementKey(placement));
        return (
          <PlacementGlyph
            key={placement.localId}
            placement={placement}
            colour={isWrong ? RED : feedback ? GREEN : BLUE}
          />
        );
      })}

      {feedback && missingPlacements.map((placement, i) => (
        <PlacementGlyph key={`missing-${i}`} placement={placement} colour={GREEN} />
      ))}

      {!feedback && selectedSymbolId && hoverPlacement && (
        <PlacementGlyph placement={hoverPlacement} colour={BLUE} opacity={0.45} />
      )}
    </svg>
  );
}

function StatCard({ label, value }) {
  return (
    <div className="rounded-xl border bg-stone-50 p-3 text-center">
      <div className="text-xs uppercase tracking-wide text-stone-500">{label}</div>
      <div className="text-xl font-semibold">{value}</div>

function Feedback({ feedback }) {

  return (
    <div className={`inline-flex items-center justify-center gap-2 whitespace-nowrap text-center font-semibold ${feedback.correct ? "text-green-600" : "text-red-600"}`}>

}

function HelpPanel() {
  const descriptions = {

function App() {
  const timerRef = useRef(null);
  const customiseRef = useRef(null);
  const audioContextRef = useRef(null);
  const audioStopTimerRef = useRef(null);
  const playbackHighlightTimersRef = useRef([]);

  const [enabledTypes, setEnabledTypes] = useState(() => QUESTION_TYPES.map((type) => type.id));
  const [question, setQuestion] = useState(() => makeQuestion());
  const [selectedSymbolId, setSelectedSymbolId] = useState(null);
  const [placements, setPlacements] = useState([]);
  const [hoverPlacement, setHoverPlacement] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [wrongPlacements, setWrongPlacements] = useState([]);
  const [missingPlacements, setMissingPlacements] = useState([]);
  const [prompt, setPrompt] = useState("");
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [isAudioPlaying, setIsAudioPlaying] = useState(false);
  const [activePlaybackNoteId, setActivePlaybackNoteId] = useState(null);

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);

  useEffect(() => {
    function handlePointerDown(event) {
      if (!customiseOpen) return;
      if (customiseRef.current && customiseRef.current.contains(event.target)) return;
      setCustomiseOpen(false);
    }

    document.addEventListener("pointerdown", handlePointerDown);
    return () => document.removeEventListener("pointerdown", handlePointerDown);
  }, [customiseOpen]);

  useEffect(() => () => stopAudioPlayback(), []);

  function stopAudioPlayback() {
    if (audioStopTimerRef.current) window.clearTimeout(audioStopTimerRef.current);

    playbackHighlightTimersRef.current.forEach((timerId) => window.clearTimeout(timerId));
    playbackHighlightTimersRef.current = [];

    if (audioContextRef.current) audioContextRef.current.close();

    audioStopTimerRef.current = null;
    audioContextRef.current = null;

    setActivePlaybackNoteId(null);
    setIsAudioPlaying(false);
  }

  function newQuestion(nextEnabledTypes = enabledTypes) {
    if (timerRef.current) window.clearTimeout(timerRef.current);

    stopAudioPlayback();
    setQuestion(makeQuestion({ enabledTypes: nextEnabledTypes }));
    setSelectedSymbolId(null);
    setPlacements([]);
    setHoverPlacement(null);
    setFeedback(null);
    setWrongPlacements([]);
    setMissingPlacements([]);
    setPrompt("");
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    newQuestion();
  }

  function toggleQuestionType(id) {
    setEnabledTypes((current) => {
      if (current.includes(id) && current.length === 1) return current;

      const updated = current.includes(id)
        ? current.filter((type) => type !== id)
        : [...current, id];

      window.setTimeout(() => newQuestion(updated), 0);
      return updated;
    });
  }

  function pointerToSvg(event) {
    const rect = event.currentTarget.getBoundingClientRect();
    return {
      x: ((event.clientX - rect.left) / rect.width) * VIEWBOX_WIDTH,
      y: ((event.clientY - rect.top) / rect.height) * VIEWBOX_HEIGHT,
    };
  }

  function handlePointerMove(event) {
    if (!selectedSymbolId || feedback) {
      setHoverPlacement(null);
      return;
    }

    setHoverPlacement(snapPlacement(pointerToSvg(event), selectedSymbolId));
  }

  function handleLockPlacement(event) {
    if (!selectedSymbolId || feedback || !hoverPlacement) return;

    event.preventDefault();

    const newPlacement = {
      ...hoverPlacement,
      localId: Math.random().toString(36).slice(2),
    };

    setPlacements((current) => {
      const isTimeBar = newPlacement.symbolId === "first-time" || newPlacement.symbolId === "second-time";
      const isDcPlacement = newPlacement.symbolId === "dc";

      return [
        ...current.filter((p) => {
          if (placementKey(p) === placementKey(newPlacement)) return false;
          if (isTimeBar && p.symbolId === newPlacement.symbolId) return false;
          if (
            isTimeBar &&
            (p.symbolId === "first-time" || p.symbolId === "second-time") &&
            p.barIndex === newPlacement.barIndex &&
            p.anchor === newPlacement.anchor
          ) return false;
          if (isDcPlacement && p.symbolId === "dc") return false;
          return true;
        }),
        newPlacement,
      ];
    });

    setPrompt("");
  }

  function clearPlacements() {
    if (!feedback) {
      setPlacements([]);
      setHoverPlacement(null);
      setPrompt("");
    }
  }

  function applyResult(isCorrect) {
    const newStreak = isCorrect ? streak + 1 : 0;

    setAttempted((v) => v + 1);
    setCorrect((v) => v + (isCorrect ? 1 : 0));
    setStreak(newStreak);
    setBestStreak((v) => Math.max(v, newStreak));
    setFeedback({ correct: isCorrect });

    if (timerRef.current) window.clearTimeout(timerRef.current);
    timerRef.current = window.setTimeout(() => newQuestion(), isCorrect ? 2000 : 4000);
  }

  function confirmAnswer() {
    if (feedback) return;

    stopAudioPlayback();

    if (!placements.length) {
      setPrompt("Place at least one symbol on the score before pressing Confirm.");
      return;
    }

    const missing = getMissingRequired(question, placements);
    const wrong = getWrongPlacements(question, placements);

    setMissingPlacements(missing);
    setWrongPlacements(wrong);

    if (question.type === "first-second") {
      const hasFirst = placements.some((p) => p.symbolId === "first-time");
      const hasSecond = placements.some((p) => p.symbolId === "second-time");

      if (hasFirst && !hasSecond) setPrompt("A 1st time bar also needs a 2nd time bar.");
      if (!hasFirst && hasSecond) setPrompt("A 2nd time bar needs a matching 1st time bar.");
    }

    if (question.type === "dc" && placements.some((p) => p.symbolId === "dc" && p.anchor === "below")) {
      setPrompt("D.C. must be placed above the stave.");
    }

    applyResult(placementsMatchScenario(question, placements) && wrong.length === 0 && missing.length === 0);
  }

  function playQuestionAudio() {
    if (isAudioPlaying) return;

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;

    if (!AudioContextClass) {
      setPrompt("Audio playback is not supported in this browser.");
      return;
    }

    stopAudioPlayback();

    const audioContext = new AudioContextClass();
    audioContextRef.current = audioContext;

    setIsAudioPlaying(true);

    const beatSeconds = 60 / 80;
    let currentTime = audioContext.currentTime + 0.08;

    question.performedOrder.forEach((barIndex) => {
      const bar = question.bars[barIndex];
      const chordStartTime = currentTime;
      const chordDuration = barDurationSeconds(bar, beatSeconds);

      chordFrequencies(bar.chord).forEach((frequency) => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const filter = audioContext.createBiquadFilter();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, chordStartTime);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(700, chordStartTime);

        gain.gain.setValueAtTime(0.0001, chordStartTime);
        gain.gain.exponentialRampToValueAtTime(0.047, chordStartTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.034, chordStartTime + chordDuration * 0.9);
        gain.gain.exponentialRampToValueAtTime(0.0001, chordStartTime + chordDuration);

        oscillator.connect(filter);
        filter.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.start(chordStartTime);
        oscillator.stop(chordStartTime + chordDuration);
      });

      bar.notes.forEach((note) => {
        const duration = rhythmInfo(note.rhythm).beats * beatSeconds;
        const startMs = Math.max(0, (currentTime - audioContext.currentTime) * 1000);

        playbackHighlightTimersRef.current.push(window.setTimeout(() => setActivePlaybackNoteId(note.id), startMs));
        playbackHighlightTimersRef.current.push(window.setTimeout(() => setActivePlaybackNoteId(null), startMs + duration * 1000));

        const oscillator = audioContext.createOscillator();
        const colourOscillator = audioContext.createOscillator();
        const colourGain = audioContext.createGain();
        const gain = audioContext.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(frequencyForStep(note.step), currentTime);

        colourOscillator.type = "sine";
        colourOscillator.frequency.setValueAtTime(frequencyForStep(note.step) * 2, currentTime);
        colourGain.gain.setValueAtTime(0.08, currentTime);

        gain.gain.setValueAtTime(0.0001, currentTime);
        gain.gain.exponentialRampToValueAtTime(0.22, currentTime + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.08, currentTime + duration * 0.86);
        gain.gain.exponentialRampToValueAtTime(0.0001, currentTime + duration);

        oscillator.connect(gain);
        colourOscillator.connect(colourGain);
        colourGain.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.start(currentTime);
        colourOscillator.start(currentTime);
        oscillator.stop(currentTime + duration);
        colourOscillator.stop(currentTime + duration);

        currentTime += duration;
      });
    });

    audioStopTimerRef.current = window.setTimeout(() => {
      setIsAudioPlaying(false);
      setActivePlaybackNoteId(null);
      playbackHighlightTimersRef.current = [];
      audioContextRef.current = null;
    }, Math.max(0, (currentTime - audioContext.currentTime) * 1000) + 100);
  }

  return (
    <div className="min-h-screen bg-stone-50 p-4 text-stone-950 md:p-8">
      <div className="mx-auto max-w-6xl">
        <header className="mb-5 rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
          <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
              <h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Repeat Signs</h1>
              <p className="mt-2 text-stone-700">Learn how to interpret repeat signs, 1st and 2nd time bars, and da capo (D.C.).</p>
            </div>
            <div className="grid min-w-[280px] grid-cols-3 gap-2">
              <StatCard label="Score" value={`${correct}/${attempted}`} />
              <StatCard label="Accuracy" value={`${accuracy}%`} />
              <StatCard label="Streak" value={streak} />
            </div>
          </div>
        </header>

        <main className="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm md:p-6">
          <div className="mb-4 flex items-start justify-between gap-3">
            <div className="relative" ref={customiseRef}>
              <button
                type="button"
                onClick={() => setCustomiseOpen((v) => !v)}
                className="rounded-xl border border-stone-300 bg-white px-4 py-2 text-sm font-semibold text-stone-800 hover:bg-stone-100"
              >
                ⚙️ Customise
              </button>

              {customiseOpen && (
                <section className="absolute left-0 z-20 mt-2 w-[360px] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
                  <h2 className="mb-3 text-base font-semibold">Customise</h2>
                  <h3 className="mb-2 text-sm font-bold text-stone-700">Question types</h3>

                  <div className="space-y-2">
                    {QUESTION_TYPES.map((type) => (
                      <button
                        key={type.id}
                        type="button"
                        onClick={() => toggleQuestionType(type.id)}
                        className="flex w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-3 py-2 hover:bg-stone-100"
                      >
                        <span className="flex items-center gap-3">
                          <span className="flex h-12 w-16 items-center justify-center overflow-hidden rounded-lg border border-stone-200 bg-white">
                            <CustomiseQuestionGlyph typeId={type.id} />
                          </span>
                          <span className="text-sm font-semibold">{type.label}</span>
                        </span>
                        <span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${enabledTypes.includes(type.id) ? "bg-green-600" : "bg-stone-300"}`}>
                          <span className={`h-4 w-4 rounded-full bg-white transition ${enabledTypes.includes(type.id) ? "translate-x-5" : "translate-x-0"}`} />
                        </span>
                      </button>
                    ))}
                  </div>
                </section>
              )}
            </div>

            <div className="flex justify-end gap-2">
              <button
                type="button"
                onClick={() => setHelpOpen((v) => !v)}
                title="Help"
                aria-label="Help"
                className="flex h-9 w-9 items-center justify-center rounded-full border border-stone-300 bg-white text-lg font-bold text-stone-700 hover:bg-stone-100"
              >
                ?
              </button>
              <button type="button" onClick={resetScore} className="rounded-xl bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">
                Reset score
              </button>
            </div>
          </div>

          {helpOpen && <HelpPanel />}

          <div className="relative overflow-hidden rounded-xl border border-stone-200 bg-white">
            <Score
              question={question}
              selectedSymbolId={selectedSymbolId}
              placements={placements}
              hoverPlacement={hoverPlacement}
              feedback={feedback}
              wrongPlacements={wrongPlacements}
              missingPlacements={missingPlacements}
              activePlaybackNoteId={helpOpen ? activePlaybackNoteId : null}
              onPointerMove={handlePointerMove}
              onPointerLeave={() => setHoverPlacement(null)}
              onLockPlacement={handleLockPlacement}
            />
          </div>

          <section className="mt-4 rounded-xl border border-stone-200 bg-stone-50 p-4">
            <div className="mb-4 flex items-start justify-between gap-3">
              <div>
                <p className="text-base font-semibold">{question.prompt}</p>
                {prompt && <p className="mt-1 text-sm font-medium text-red-700">{prompt}</p>}
              </div>
              <button
                type="button"
                onClick={playQuestionAudio}
                disabled={isAudioPlaying}
                aria-label="Play excerpt"
                title="Play excerpt"
                className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-stone-950 text-white hover:bg-stone-800 disabled:cursor-not-allowed disabled:opacity-50"
              >
                <span className="ml-0.5 text-lg leading-none">▶</span>
              </button>
            </div>

            <div className="grid gap-2 sm:grid-cols-2 lg:grid-cols-5">
              {SYMBOLS.map((symbol) => (
                <button
                  key={symbol.id}
                  type="button"
                  disabled={Boolean(feedback)}
                  onClick={() => {
                    setSelectedSymbolId(symbol.id);
                    setPrompt("");
                  }}
                  className={`flex flex-col items-center justify-center rounded-xl border px-3 py-2 text-sm font-semibold ${selectedSymbolId === symbol.id ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`}
                >
                  <SymbolButtonGlyph id={symbol.id} />
                  <span>{symbol.label}</span>
                </button>
              ))}
            </div>

            <p className="mt-3 text-sm text-stone-700">Choose a symbol, hover over the score to preview it, then click to lock it in place.</p>
          </section>

          <div className="mt-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <Feedback feedback={feedback} />

            <div className="flex w-full justify-end gap-2">
              <button
                type="button"
                disabled={Boolean(feedback)}
                onClick={clearPlacements}
                className="rounded-xl bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 disabled:opacity-60"
              >
                Clear
              </button>
              <button
                type="button"
                onClick={confirmAnswer}
                disabled={Boolean(feedback)}
                className="rounded-xl bg-green-600 px-5 py-2 text-sm font-bold text-white hover:bg-green-700 disabled:opacity-60"
              >
                Confirm
              </button>
            </div>
          </div>

          <div className="mt-4 text-sm text-stone-600">Best streak: {bestStreak}</div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
